body:
  text: 卷八禽獸部燕窩味甘平淡入手太陰經功專養肺陰化痰止嗽補而能清為調理虛損癆瘵之聖藥一切病之由於肺虛不能清肅下行者此皆可治開胃氣已勞痢益小兒痘疹用陳久糙米色者佳喉閉不能下咽人已神昏用燕巢泥雄黃高粱酒浸透塗喉咽外兩旁邊中留一線之縫遂即喉能下咽如牙關緊閉先以烏梅擦牙根再以燕巢泥等塗喉外方妙燕窩腳名血燕色紅紫功用相仿性重達下微咸潤下治噎膈妙假燕窩無邊無毛或微有毛色白如銀絲服之無益夜明砂味辛寒入手足厥陰經血分功專散血明目得石決明豬肝治雞盲淘淨焙惡白薇白蘞小兒鬾病以紅紗袋盛夜明砂佩之鬾音奇小兒鬼也一名天鼠矢五靈脂味甘溫氣味俱厚入足厥陰經功專散血止痛得蒲黃治心腹疼痛産後惡露刺痛得雄黃酒調敷蛇咬傷血虛無瘀者忌服惡人參研末酒飛去砂石用行血宜生止血宜炒油調末塗風癩良一名寒號蟲雀味甘溫入手足少陰太陽經功專壯陽起陽道令人有子益精髓暖腰膝縮小便治血崩帶下得蛇床子熬膏和藥丸服補下謂之驛馬丸得附子熬膏丸治虛寒名雀附丸凡陰虛火盛及服白朮李並諸肝切忌孕婦尤須避之頭血取點雀盲數十次即愈雀卵酸溫益精血治男子陰痿不起女子帶下便溺不利和天雄服之令莖不衰鴿味鹹平入手足太陽經功專解諸藥毒治惡瘡風癬白癜癧瘍風唯色白者入藥卵解瘡毒痘毒屎名左盤龍消腹中痞塊瘰癧諸瘡療破傷風及陰毒垂死者人馬疥瘡炒研敷之驢馬和草飼之消腫殺蟲頭瘡白禿鴿糞研末敷之先以醋泔洗淨雞味甘溫入手足太陰陽明經功專補虛溫中以血塗面瀝口吹鼻治中惡驚忤雞子甘平益氣補血雞子略敲損浸尿缸中三日煮熟薑汁竹瀝湯送下治年深哮喘風痰醋煮雞子治赤白痢哺雞子殼主治傷寒勞復研敷下疳麻油調搽痘毒神效卵中白皮治久嗽結氣雞肫皮一名雞內金又名䏶胵甘平性澀雞之脾也消水穀除煩熱通小腸膀胱治瀉痢便數遺溺血崩溺血帶下腸風膈消反胃小兒食瘧男用雌女用雄雞屎白薇寒下氣消積通利大小便治蠱脹合米炒治米症醋和塗蚯蚓蜈蚣咬毒小兒緊唇以之研敷有涎易去牙痛以之燒末綿裹咬患處效雞汁煮粥食固胎然性升發有宿疾者宜禁食雞屎一名雞矢醴烏骨雞味甘鹹入手太陰足厥陰少陰經功專補勞傷得涼血補精藥治勞瘵鬼擊卒死者用烏雞冠血瀝口中令咽仍破此雞拓心下冷乃棄之道邊妙骨肉俱黑者佳男用雌女用雄女科有烏雞丸雉味酸甘味寒入足太陰經功專補中益氣力止泄痢治蟻瘻動風有宿疾者禁忌即野雞也鵝味甘溫有毒入足厥陰經功專發風發瘡火熏者尤毒卵甘溫補中氣多食發痼疾鵝血愈噎膈反胃痔瘡有核白鵝膽二三枚取汁入熊膽二分片腦五釐研勻密封瓷器內勿泄氣用時以手指塗之立效噎膈病白鵝尾毛燒灰米湯下每服一錢數次即愈鵜鶘油味鹹溫滑入足少陰太陰經功專塗癰腫治風痹透經絡通耳聾引諸藥透入病所鶩味甘平微咸入手太陰足少陰經功專補陰除蒸止嗽利水治熱痢化虛痰白毛而老者良葛可久有白鳳膏治虛勞熱血解石砒毒及中惡溺死者並塗蚯蚓咬瘡卵甘寒咸除心腹膈熱多食發冷氣令人氣短胸悶小兒多食腳軟生瘡者食之令惡肉突出不可合鱉肉李子桑椹食頭利小便治水腫腦塗凍瘡良即鴨也鳧味甘涼入手太陰足少陰經功專補中益氣平胃消食治水腫及熱毒風氣惡瘡身上有諸小熱瘡年久不愈者但多食之即愈並殺臟腑一切蟲忌與胡桃木耳豆豉同食即野鴨也鸊鷉味甘平入手太陰足少陰經功專補中益氣一名刁鴨又名油鴨似鴨而小蒼白紋多脂冬月取之五味炙食甚美膏滴耳中治耳聾鷺鷥味鹹平入手太陰經功專益脾補氣治虛瘦一名白鷺斑鳩味甘平入手太陰足少陰經功專益氣助陰陽明目愈噎血熱飲治蠱鵲味甘寒入手足太陰太陽經及陽明經功專消結熱治消渴通淋去風及大小腸澀並四肢煩熱胸膈痰結入藥用雄燒毛作屑納水中浮者是雄豬味鹹寒入手足太陰少陰陽明經功專療腎氣虛竭潤腸胃生精液豐肌體澤皮膚惟生痰招風陽痿及傷風寒病初起者均忌食心血可作補心之嚮導肝同夜明砂作丸治雀目肚入胃健脾肺蘸薏仁末治肺虛咳嗽腎鹹冷通腎治腰痛耳聾腸得黃連治腸風血痔膽汁寒滑瀉肝膽之火明目療疳醋和灌穀道治大便不通脂膏潤燥利腸脊髓補虛勞之脊痛蹄得通草通乳汁尾血和龍腦治痘瘡倒靨均以母蹄為妙豬膚即外厚皮得白蜜米粉治少陰下痢咽痛豬腦毒不可食豬肉反烏梅桔梗豬脂得血餘治陰吹肝切片入陰戶治陰蝕蟲皆入肝內數易即愈狗味鹹酸溫入手太陰足少陰經功專暖脾益胃補虛寒助陽事狗寶結成狗腹中者專攻翻胃善理疔疽氣壯多火陽事易舉熱病之後及孕婦均忌反商陸畏杏仁惡蒜羊味甘熱入手足太陰經功專補虛勞益氣力仲景治虛羸蓐勞有當歸羊肉湯膽苦臘月入蜜膽中紙套籠住懸檐下待霜出掃取點眼又入蜜膽中蒸之候乾研為膏每含少許或點之名二百味草花膏以羊食百草蜂採百花也肺通肺氣止咳嗽利小便腎益精助陽胲結成羊腹中者除翻胃角明目殺蟲血生飲治産後血暈悶絶及中金銀丹石砒硫毒乳補肺腎潤胃脘大腸之燥治反胃消渴口瘡舌腫蜘蛛咬傷有渾身生絲者飲之良誤吞銅鐵以羊脛骨灰三錢米飲下反半夏菖蒲忌銅器及醋牛味甘溫入手足太陰陽明經功專補脾益氣止渴乳味甘微寒潤腸胃解熱毒補虛勞治反胃噎膈得韭汁薑汁陳酒佳用牡牛肉草斤洗淨煮為糜濾去滓熬成琥珀色前一日不食下日空腹飲汁一鍾少時又飲積數十鍾寒月溫飲如病在上則吐在下則利在中則吐利利後必渴渴則飲己溺以滌余垢飢倦先與米飲二日然後與淡粥次與厚粥軟飯沉疴悉除矣名倒倉法白水牛喉治反胃吐食腸結不通髓補中填髓筋補肝強筋老病及自死之牛食之損人霞天膏氣味甘溫主治中風偏廢口眼歪斜痰涎壅塞五臟六腑留痰宿飲癖塊手足皮膚中痰核神效得橘皮茯苓蘇子蔻仁半夏蒼朮為面治脾胃濕痰得陳皮貝母蘇子栝蔞根杏仁蓬砂為曲治積熱痰結牛黃味苦入足厥陰經功專清心化熱利痰涼驚得靈羊角或犀角硃砂治小兒諸驚人參為使惡常山地黃龍膽龍骨得丹皮菖蒲良黃明膠味甘平入手足少陰厥陰經功專補陰治諸血證及癰疽潤燥通大便得穿山甲四片燒存性用治癰疽初起使毒不內攻神效惟膠須以酒頓煬如便毒初起水膠溶化塗之即散即牛皮膠也驢溺味辛寒入足陽明經功專殺蟲得四物治反胃噎膈得薑汁洗白玷風驢陰莖強陰壯筋乳浸黃連取汁點風火赤眼良阿膠味甘平入手太陰足厥陰經功專清肺養肝滋腎補陰止血去瘀除風化痰潤燥定喘利大小腸治虛勞咳嗽肺痿吐膿吐血衄血血淋血痔腸風下痢腰痠骨痛血痛血枯經水不止妊娠尿血下血俱以酒沖服炒焦膠末良小兒驚風后瞳神不正以膠倍人參服甚效胃弱作嘔吐脾虛食不消及風寒而嗽者均忌蛤粉炒化痰蒲黃炒止血酒化水化童便和用得火良山藥為使畏大黃白馬溺味辛寒入足陽明手太陰經功專殺蟲破症積治反胃化鱉為水白馬乳治青腿牙疳其效如神馬肝有毒白馬通即屎也得柏葉乾姜艾治吐血不止虎骨味辛平入足厥陰經功專追風定痛得沒藥治歷節痛風得兔腦能止滑利得木通治手足麻木得乳香能催生下胎睛得竹瀝小兒驚癇夜啼服之即愈虎肚弗洗煅存性入平胃散一兩和勻每服三錢治反胃吐食神效象皮味鹹氣平入足太陽經功專長肌肉燒灰和油敷下疳亦可熬膏牙治諸刺入肉傷喉服飲皆效犀角味苦鹹入手少陰足厥陰經功專涼血解毒得地榆治血痢得生地連翹治熱邪入絡凡中毒箭以角刺瘡中愈飲食中有毒以角攪之便生白沫入湯劑磨汁用升麻為使忌鹽以角納入懷內得人熱氣易碎熊膽味苦寒入足厥陰經功專涼心平肝明目殺蟲治驚癇五痔實熱宜之虛者忌性善闢塵撲塵水上投膽米許即開肉補虛羸掌御風寒益氣力美品也羚羊角味鹹入足厥陰經功專散風清熱得鉤藤息肝風得生熟地茵陳芩枳枇杷石斛甘草二冬桂苓名甘露飲治胃中濕熱然臨症時宜酌一角者勝或研或磨用能碎金鋼石鹿茸味辛溫入足少陰厥陰經功專補精益氣得菟絲羊腎茴香治腰痛得人參黃耆當歸提痘漿鹿屬陽夏至得陰氣解角麋屬陰冬至得陽氣解角鹿補陽氣麋補陰血麋茸味甘溫入足太陰少陰經功專滋陰益腎得附子雀卵壯陽不老得附子山藥補元駐顏角與鹿角功同而溫性差減以皮作靴襪除腳氣鹿角味鹹溫入足少陰厥陰經功專補腎益肝斂精止血生用散熱行血消腫辟邪治夢與鬼交熬膏煉霜則專滋補益腎生精血強骨壯腰膝鹿䘒大補虛勞鹿筋主勞損續絶鹿肉甘溫補中強五臟通血脈益氣力上焦有痰熱胃家有火吐血屬陰衰火盛者俱忌服畏大黃鹿名斑龍麝香味辛溫入足太陰經功專開竅得肉桂消瓜果諸積得鹽豉燒酒為末淬酒服産婦敗血裹子難産效忌蒜防蟲入腦慎勿近鼻貓胞味甘酸溫入手足太陰經功專治反胃吐食燒灰入硃砂末少許壓舌下甚效豬獾味甘酸平入手足太陰經功專長肌肉野獸中貒肉為最美治上氣虛乏咳逆勞熱水脹久不瘥得粳米蔥豉作粥食神效狗獾味甘酸平入手太陰經功專補中益氣治小兒疳瘦一名天狗兔屎味辛平入手足太陰足厥陰經功專殺蟲明目治勞瘵五疳痘後生翳肝明目肉涼血解熱毒利大腸妊娠忌之腦塗凍瘡豭鼠矢味甘微寒入足厥陰經功專治勞復得韭根治男子陰陽易亦治膀胱水結通女子經閉陰脫吹乳誤入食中令人目黃成疸兩頭尖者為雄鼠矢膽汁滴耳中治老聾點眼亦良以辰砂拌鼠睪丸陰乾研服治小兒驚癇肉治兒疳鼠瘻蝟皮味苦入手足太陰陽明經功專開胃氣治五痔陰腫燒灰研細末陳菜油調塗治胃逆腸風瀉血燒灰存性研末酒沖服肉治反胃脂滴耳中治耳聾膽點痘後風眼均效
