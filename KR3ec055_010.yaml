body:
  text: 卷十水火土部立春雨水二節內水升陽味甘平宜煎中氣不足清陽不升之藥驚蟄春分清明穀雨四節內水升陽味甘平宜煎發散及補中益氣藥並浸造諸風及脾胃虛弱諸丹丸小滿水毒壞豆麥桑葉造各樣藥料食物皆易敗人吃此水亦生脾胃疾咸雨小滿節後先逢癸日下雨為咸雨毒尤甚梅雨水毒甚消伐洗瘡疥滅瘢痕入醬易熟但不可以造酒醋梅或作黴凡衣被黴以梅葉煎湯洗之即去重午日午時水宜造瘧痢瘡瘍金瘡百蟲蠱毒諸丹丸用煎殺祟藥其效尤神神水甘寒和獺肝為丸治心腹積聚及蟲病獨煎飲此水能清熱化痰定驚安神五月五日午時雨伐竹中之水即是以上諸水皆能助濕立秋處暑白露秋分四節內水潤肺宜煎肅清肺氣之藥寒露水毒壞禾稻與小滿水同彥云寒露雨偷稻鬼霜降水瀉熱陽氣有餘者宜用此煎藥液雨水宜煎殺蟲消積之藥立冬後十日至小雪下雨名液蟲飲水即伏蟄來春雷鳴起蟄乃出也大雪冬至小寒大寒臘日水瀉熱宜浸造滋補五臟及痰火神聚蟲毒諸丹丸並煮釀藥酒與雪水同功明水味甘寒主治明目定心止渴去小兒煩熱周禮司烜氏以夫燧取明火於日鑑取明水於月以供祭祀並以金作之謂之水火之鏡午月丙午日午時鑄為陽燧一名陽符子月壬子日子時鑄為陰燧一名陰符又名方諸水露水味甘平止消渴宜煎潤肺之藥秋露造酒最清洌百花上露令人好顏色露能解暑故白露降則處暑矣瘧必由暑故治瘧藥露一宿良霜味甘寒解酒熱治傷寒鼻塞酒後諸熱面赤和蚌粉敷暑月痱瘡及腋下赤腫立瘥臘雪味甘寒治時行瘟疫宜煎傷寒火暍之藥抹痱良春雪無用且易敗冰味甘寒太陰之精水極似土變柔為剛所謂物極反兼化也傷寒陽毒熱甚昏迷者以一塊置膻中良解燒酒毒以上皆天水潦水味甘平宜煎調脾胃去濕熱之藥降注雨水為潦又名無源水半天河水味甘微寒治鬼痙狂邪惡毒洗諸瘡去蠱殺鬼精恍惚妄語與飲之勿令知之槐樹間者治諸風及惡瘡風瘙疥癢一名上池水此竹籬頭水及空樹穴中水也戰國策云長桑君飲扁鵲以上池之水即半天河水也甘爛水以流水瓢揚萬遍亦曰勞水性本咸而重勞之則甘而輕煎傷寒勞傷等藥取其不助腎氣而益脾胃也急流水性速趨下通二便風痹藥宜之逆流水因性逆而倒上中風卒厥宣吐痰飲之藥宜之井泉水新汲者療病宜人宜煎補陰藥及氣血痰火藥醴泉水甘平治心腹痛疰忤鬼氣邪穢反胃霍亂一名甘泉玉井水甘平服之長壽令人體潤毛髮不白華山有玉水溜下土人得之日服多長生乳穴水甘溫久服肥健人與鍾乳同功近乳穴處流出之水也溫泉水辛熱微毒治諸風筋骨攣縮肌皮頑痹手足不遂疥癬諸疾在皮膚骨節者浴之自愈胡任漁隱叢話云湯泉多作硫黃氣浴之則襲人肌膚唯新安黃山硃砂泉春時水微紅可飲長安驪山是礜石泉不甚作氣也硃砂泉雖紅而不熱當是雄黃爾有砒石處亦有湯泉浴之有毒凡浴泉水者必體壯方可阿井水甘鹹平下膈疏痰止吐阿井在兗州陽穀縣即古東阿縣也又青州范公泉其水用造白丸子利膈化痰山岩泉水甘平治霍亂煩悶嘔吐腹痛轉筋恐入腹宜多服之此山岩土石間所出泉流為溪澗者也惟陸羽茶經云凡瀑湧漱湍之水飲之令人有頸疾汪穎曰昔在潯陽忽一日城中馬死數百匹詢之云數日前雨洗出山谷蛇蟲之毒馬飲其水然也以是觀之山岩泉水用之可不慎乎海水咸微溫有小毒煮浴去風瘙癬飲一合吐下宿食顱脹地漿甘寒治泄痢冷熱赤白腹內熱毒絞痛解一切魚肉菜果藥物諸菌毒及蟲蜞入腹用此下之中暍卒死者取道上熱土圍臍令人尿其中仍用熱土大蒜等分搗末去渣灌之即活一名土漿以新汲水沃黃土攪濁再澄清用百沸湯助陽行氣若半沸者飲之反傷元氣作脹蛇繞不解以熱湯淋之即脫忤惡卒死銅瓦器盛熱湯膈衣尉其腹心腹卒痛欲死以之漬手足水冷則易之良一名太和湯一名麻沸湯生熟湯調中消食治霍亂吐瀉邪在上焦則吐邪在下焦則瀉邪在中焦則吐瀉交作此濕霍亂猶易治也惟心腹絞痛不得吐瀉名乾霍亂俗名絞腸沙其死甚速古方用鹽熬熱童便調服極穩勿與穀食則米飲下咽亦死以新汲水百沸湯合一盞和勻均用河水為要齏水酸鹹吐痰飲宿食酸苦漏泄為陰也此乃作黃齏菜水甑氣水以器盛取沐頭長髮令黑潤朝朝用梳摩小兒頭久覺有益小兒諸疳遍身或面上生瘡爛成孔白如楊梅瘡百藥不效用蒸糯米甑氣水掃瘡上不數日即愈銅壺滴漏水性滑上可至顛下可至泉宜煎四末之藥説文曰漏以銅壺受水刻節晝夜百刻周禮周官曰挈壺氏掌壺以水火守之分以日夜及冬則以火爨鼎水而沸之而沃之鄭康成曰冬水凍故以火炊水沸以沃之謂沃漏也桑柴火主治癰疽發背不起瘀肉不腐及陰瘡瘰癧流注臁瘡頑瘡然火吹滅日炙二次未潰拔毒止痛已潰補接陽氣去腐生肌凡一切補藥諸膏宜此火煎之炭火櫟炭火宜煅煉一切金石藥烰炭火宜烹煎炙焙百藥丸散蘆火竹火宜煎一切滋補藥燈火陽絡脈盛處以燈心蘸麻油點燈淬之良外痔腫痛者亦淬之油能去風解毒火能通經也小兒初生因冒寒氣欲絶者勿斷臍急烘絮包之將胎衣烘熱用燈炷於臍下往來燎之暖氣入腹內氣回自蘇又燒銅匙柄尉烙眼弦內去風退赤甚妙惟燈用胡麻油蘇子油然者明目治病其餘之油燈煙皆損目亦不治病燈花主治敷金瘡止血生肉小兒邪熱在心夜啼不止以二三顆燈花調抹乳頭令吮之即止得辰砂少許拌尤效艾火灸百病若灸風冷諸疾入石硫黃末少許更妙神針火治心腹冷痛風寒濕痹附骨陰疽凡在筋骨隱痛者針之火氣直達痛所甚效神針火者五月五日取東引桃枝削為木針如雞子長五六寸干之乾透待用時以綿紙三五層襯於患處將針醮麻油點著吹滅乘熱針之雷火神針以熟蘄艾葉末二兩乳香沒藥穿山甲硫黃草烏頭川烏頭桃樹皮末各一錢麝香五分為末拌艾以厚紙裁成條鋪藥艾於內緊卷如指大長三四寸收貯瓶內地下埋七日取出用時於燈上點著吹滅隔紙十層乘熱針於患處熱氣直入其效更捷忌冷水白堊味甘溫治男子水藏冷女子子宮冷卒暴咳嗽風赤爛眼反胃瀉痢為末敷痱子瘙癢煅研生油調搽臁瘡良即白墡土也伏龍肝味辛溫調中止血去濕消腫治咳逆反胃吐衄崩帶尿血遺精醋調塗腸風癰腫研末敷臍瘡臘月豬脂或雞子白調敷丹毒水調服催生下胎即灶心黃土也年久對釜臍下者良無濕者勿服得生地黃芩白朮阿膠炙草炮薑名黃土湯治婦人血崩及血衄諸血病得阿膠蠶砂治婦人血漏得附子黃芩阿膠治便後下血東壁土甘溫治霍亂煩悶泄痢溫瘧療下部瘡脫肛小兒臍風摩乾溼癬此屋外向東之壁上土也以新汲水攪化澄清服之治霍亂吐瀉嗜汙泥者以土調服即愈墨味辛溫止血生肌飛絲塵芒入目濃磨點之點塞鼻中止鼻衄豬膽汁或醋磨汁塗癰腫酒磨服治胞胎不下五月午日午時以蝦蟆嘴內填墨一塊曬之日西取出墨將蝦蟆放去此墨治血症極效松煙墨良釜臍墨味辛溫治中惡蠱毒吐血血暈以酒或水溫服亦塗金瘡止血生肌消食積舌腫喉痹口瘡陽毒發狂一名釜煤百草霜味辛溫止血魘寐卒死水化吹鼻效即灶突上煙煤梁上塵味辛苦微寒治腹痛噎膈中惡鼻衄小兒軟瘡消食積止金瘡血出齒齦出血凡用倒挂塵燒令煙盡篩取末入藥一名烏龍尾鹼味辛苦澀溫消食磨積去垢除痰治反胃噎膈點痣靨疣贅以礦灰等分用小麥稈灰煎汁干為末針刺挑破水調點之一日三上即去須新合乃效發麵浣衣多用之孩兒茶味苦澀微寒清上膈熱化痰生津止血收濕定痛生肌塗金瘡口瘡陰疳痔腫硼砂或冰片少許調塗龜頭爛合冰片塗之神效
