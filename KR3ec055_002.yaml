body:
  text: 卷二木部茯苓味甘淡入手足太陰太陽經功專補心益脾得人參能下氣得半夏能滌飲若虛寒遺溺泄精者當用溫補之品不宜用此皮膚治水腫膚脹赤者利水尤捷惡白蘞畏地榆秦艽龜甲雄黃忌醋茯神味甘淡入手少陰經功專開心益智止驚悸虛人小腸不利得棗仁能安神得乳香木瓜酒治筋骨攣痛琥珀味甘淡入手少陰少陽足厥陰經血分功專消瘀通淋得黑穭豆治産後神昏得麝香治小便淋瀝用柏子仁末入瓦鍋同煮半日搗末用松節味苦溫入手太陰陽明少陰足厥陰經功專驅骨中之風燥血中之濕化毒殺蟲釀酒良血分虛者忌服松毛浸油塗頭生髮並敷凍瘡治陰囊濕癢松花為末止血擦豆瘡傷損並濕爛不痂松脂止痛生肌熬膏貼崩中惡痹及牙痛松子與柏子同功側柏葉味苦澀微寒入手足太陰陽明經功專養陰滋肺燥土治吐衄崩淋腸風尿血血痢冷風濕痹或炒或生用桂牡蠣為使惡菊花宜酒柏子仁味甘入足厥陰經功專養心平肝潤腎得遠志能交通心腎得松子麻仁治老人虛祕炒研去油用搗塗黃水瘡甚效畏菊花肉桂味甘辛入足厥陰經功專療沉寒痼冷益火消陰通經催生得人參麥冬甘草能益中氣得紫石英治吐逆得二苓澤瀉白朮行水去粗皮用得人參甘草麥冬良忌生蔥石脂足躄筋急桂末和白酒塗外腎偏腫水調塗均效産交趾者良桂心味苦入手少陰足太陰經功專引血化汗內托癰疽同丁香治痘瘡灰塌消瘀生肌補虛寒宣氣血利關節治風痹癥瘕噎膈腹滿心腹諸痛桂枝去皮為桂心桂枝味辛溫入足太陽經功專溫經通脈去風止汗得芍藥甘草能利營衛得雄雞肝治小兒遺尿陰虛者忌服木犀花辛溫同百藥煎孩兒茶作膏餅噙咽生津闢臭化痰治風蟲牙痛同麻油蒸熟潤髮及作面脂以葉煎湯洗髮去垢除風嫩枝為桂枝枸杞子味甘入足厥陰少陰經功專補精血得杜仲萆薢治腎虛腰痛得青鹽川椒治肝虛目暗葉名天精草苦甘而涼清上焦心肺客熱代茶止消渴子酒潤搗用得熟地良便滑者宜避地骨皮味甘淡微苦入手太陰經功專退熱除煩得麥冬小麥治勞渴得青蒿子治虛熱得生地酒煮服治帶下若吐血尿血搗鮮汁服效婦人陰腫或生瘡以之煎水頻洗良中寒及便溏者忌甘草水浸一宿用有汗之骨蒸最宜山茱萸味酸入足厥陰少陰經功專助陽固陰得熟地補腎虛得五味攝精氣強陽不痿小便不利者忌用核滑精用尤宜去陳者良惡防己防風桔梗酸棗仁味甘酸而潤入手少陰足少陽經功專安神定志得人參茯苓治盜汗得辰砂乳香治膽虛不寐炒用惡防己杜仲味苦辛入足厥陰經功專治肝虛得羊腎治腎虛腰痛得牡蠣治虛汗得糯米山藥棗肉治胎漏胎墜得補骨脂青鹽枸杞能壯腎陽或酥酒炙蜜炙鹽酒炒薑汁炒炒斷絲用惡元參女貞子味甘苦而平入足少陰經功專益肝腎安五臟強腰膝明耳目得旱蓮草桑椹治虛損百病惟陰虛者宜之否則腹痛作瀉冬至採佳搗汁熬膏淨瓶收固埋地中七日以之點風火赤眼神效即冬青子也葉苦平除風散血消腫治頭痛目昏諸惡瘡腫以水煮葉湯貼胻瘡潰爛神效楮實味甘入足太陰少陰經功專軟骨得茯苓治水氣臌脹研末塗身面石疽水浸取沉香酒蒸用皮治水腫氣滿尤捷以汁和白芨飛面調和接紙永不解脫葉甘涼祛濕熱治老少下痢瘴痢為末白痢薑湯下赤痢沙糖湯下一名谷實桑白皮味甘入手太陰經得地骨皮瀉肺得白茯苓利水得糯米治咳嗽吐血肺氣虛及風寒作嗽者慎用續斷桂心為使忌鐵桑枝味甘苦入手足太陰經功專去風濕拘攣得桂枝治肩臂痹痛得槐枝柳枝桃枝洗遍身癢桑椹味甘酸溫色紫黑入足厥陰少陰經功專補水利五臟關節安魂鎮神聰耳明目生津止渴解金石藥之燥並利水消腫醒酒烏須多食致衄曬乾為末蜜丸良鮮者煎膏入蜜煉稠點湯服名文武膏能治瘰癧入燒酒經年愈佳桑葉味甘入手足陽明經功專清風熱得麥冬治勞熱得生地阿膠石膏枇杷葉治肺燥咳血得黑芝麻煉蜜為丸除濕祛風明目以之代茶採取經霜者常服治盜汗洗眼去風淚以木作面盆洗面去面上遊風桑寄生味甘苦入足少陰經功專堅腎助筋骨固齒長髮益血止崩下乳安胎和血除痹外科散瘡瘍追風濕得阿膠艾葉治胎動腹痛以之搗汁服治膈氣忌火山梔子味苦入手太陰經功專除煩瀉火得滑石治血淋溺閉得川烏治冷熱腹痛得香豉治腎燥並吐虛煩客熱得茵陳治五黃生用瀉火炒黑止血薑汁炒止煩嘔內熱用仁表熱用皮豬苓味苦甘入足少陰太陽經功專利水滲濕得雞矢白治小兒溺閉四苓散五苓散多用之用宜去皮黃柏味苦入足少陰經功專去濕熱得肉桂治咽痛得蒼朮治濕痿加牛膝治濕熱上行得細辛瀉膀胱火得蛤粉治赤濁白淫得參朮草薑附桂治中氣不足虛火上炎致生口瘡引火歸元得知母滋陰降火得竹瀝浸塗小兒重舌尺脈弱者忌服生用降實火蜜炙則不傷胃炒黑止崩帶酒製治上蜜制治中鹽制治下惡乾漆得知母良枳實味苦入手太陰陽明經功專破積下痰得白朮去痰飲得栝蔞消痞結得皂角通大便得參朮乾薑則益氣得硝黃牽牛則破氣孕婦及氣虛人忌陳者良麩炒用枳殼即枳實之大者其力稍緩得枯梗治虛痞得甘草治婦人體肥難産厚朴味苦入足太陰陽明經功專寬胸導濕得蒼朮治濕滿得黃連治滯下得杏仁能下氣定喘孕婦及脾胃虛者忌服薑汁炒用乾薑為使惡澤瀉硝石忌豆檳榔味苦辛入手足陽明經功專宣利臟腑壅滯得枳實治傷寒痞滿得木瓜治腳氣衝心得橘皮治金瘡噁心得木香調氣得黃芩枳殼寬腸聤耳出膿為末吹之遊丹從臍起者以醋調末塗之陰毛生蝨煎水洗即效氣虛下陷者勿服大腹皮味辛溫入足陽明太陰經功專泄肺和脾下氣行水通大小腸主治水腫腳氣痞脹痰膈瘴瘧霍亂氣虛者忌用槐角味苦寒入足厥陰經功專殺蟲得牛膽明目通神得地榆當歸防風黃芩枳殼治五種腸風瀉血得苦參治內外痔十月上巳採槐角納牛膽中陰乾百日食後吞一枚能白髮還黑腸風血痔尤宜惟性純陰虛寒虛熱而非實火及孕婦均忌去單子及五子者銅槌捶碎牛乳拌蒸槐花味苦涼入手足陽明足厥陰經功專治腸風腸熱得鬱金治小便血得荊芥穗治大便血得山梔治酒毒下血得條芩治血崩得牡蠣治赤白帶舌上無故出血名舌衄炒槐花為末摻之效含蕊而陳者良微炒用忌同槐實槐枝洗瘡痔核並陰囊濕癢良燒灰揩牙去蟲苦楝子味苦入手少陰足厥陰少陰經功專治諸疝得延胡索治熱厥心痛得吳茱萸治氣痛囊腫得補骨脂小茴香食鹽治偏墜痛不可忍有蟲耗其津液者取根皮濃煎少加麝服之下其蟲而渴自止脾胃虛寒者宜忌酒蒸去皮核肉不並用用核捶碎茴香為使一名金鈴子蔓荊子味辛甘微涼入足太陽厥陰經功專涼諸經血明目搜肝風得皂莢蒺藜治皮痹不仁得羌活防風治風熱頭痛血虛有火者慎用惡石膏烏頭石南葉味辛苦平有毒入足厥陰經功專治風痹腳弱得藜蘆瓜丁共為末吹入鼻少許一日三度內服牛黃平肝藥治小兒通睛炙用五加皮為使惡小薊辛夷味辛入手太陰足陽明經功專去頭風鼻病得川芎薄荷細辛石膏治鼻塞流涕不聞香臭得南星半夏黃柏牡蠣治鼻淵下如白膿偶感風寒鼻塞及血虛火熾者均忌去皮毛焙用川芎為使惡石脂畏菖蒲石膏蒲黃黃連一名木筆花一名迎春花郁李仁味酸甘辛苦而平入足太陰經功專下氣利水治大腸燥澀得醇酒能使人睡津液不足者勿服浸去皮尖蜜浸研金櫻子味酸澀溫入手太陰陽明經功專治脾泄精滑得芡實能固精得縮砂能益精去刺核研泄瀉由於火熱暴注小便不禁精滑因於虛火熾者不可用訶子味苦溫入手太陰陽明經功專下氣澀腸得烏梅五味則收斂得橘皮厚朴則泄氣得肉果治水瀉下利得人參治肺虛寒嗽得陳皮砂仁治冷氣腹脹佐白朮蓮子治虛寒久瀉佐樗皮治腸澼便血同蛇床五味山茱續斷杜仲治虛寒帶下嗽痢初起氣虛肺熱濕熱火沖氣喘均忌用宜酒蒸去核焙生用清金行氣熟用溫胃固腸核止咳痢一名訶黎勒烏藥味辛溫入足陽明少陰經功專消風順氣得沉香治胸腹冷氣得益智仁治小便頻數得茴香青皮良薑治五積切痛得人參沉香檳榔各磨濃汁合煎治諸喘氣血虛而有內熱者勿單服酒浸一宿炒或煅研用並療貓狗百病五加皮味辛入足厥陰少陰經功專壯筋骨除風濕得地骨皮治虛勞得丹皮當歸治婦人血風下部無風寒濕邪而有火及肝腎虛而有火者勿服遠志為使惡元參葉作蔬食去皮膚風濕椿樗味苦溫入足陽明經功專殺蟲止利得訶子母丁香醋治休息利得蒼朮枳殼治脾毒腸風得乾薑白芍黃柏治濕熱白帶得參為末每日空心溫酒或米飲下二錢治年久臟毒血痢神效性似寒虛寒陰虛以及痢疾積滯未盡者勿服去粗皮醋炙或蜜炙忌豬肉熱面榆白皮味平滑利入手太陽陽明經功專通二便利諸竅行經脈滲濕熱滑胎下有形留滯之物治五淋腫滿嗽喘不眠以醋調塗妒乳效火灼傷以末塗之良去粗皮取白用秦皮味苦澀入足厥陰少陽經功專治風寒濕痹得黃連阿膠白頭翁治産後下痢以秦皮煎湯日日溫洗治赤眼生翳效細辛大戟為使惡吳茱萸海桐皮味苦辛入足太陰陽明經功專祛風去濕殺蟲得苡仁牛膝川芎羌活地骨皮五加皮生地酒浸飲治風躄頑痹腰膝疼痛以蛇床子合為末用臘豬脂調搽風癬良蕤仁味甘微寒入手少陰厥陰太陰經功專消風散熱益水生光治目赤腫痛眥爛淚出心腹邪熱結氣痰痞得細辛竹葉煎水洗治飛血眼密蒙花味甘微寒入足厥陰經功專潤燥治目疾得黃柏為丸治目翳良揀淨酒潤焙用芙蓉花味辛平性滑涎黏入手太陰經功專清肺涼血散熱止痛或花或葉或皮或根生搗或乾研為末蜜調塗一切癰疽留頭干則換之再塗初起則痛止腫消已成則膿出易斂所云清涼膏清露散鐵箍散皆此物如加赤小豆末或蒼耳燒存性為末亦妙經水不止以芙蓉花蓮蓬殼等分為末米飲下二錢效山茶花味甘辛寒入足厥陰手陽明經功專涼血治吐衄腸風下血湯火傷麻油調塗鼻衄以之燒灰塞鼻效用紅者良杉木味辛溫入手太陰經功專去惡氣散風毒治腳氣腫痛心腹脹滿洗毒瘡鄭洵美以柳子厚得腳氣半夜痞絶脅塊如石昏困欲死傳用杉木節一升橘葉一升無葉以皮代大腹檳榔七枚連子捶碎童便三升煮分二服服一服少頃大下塊散氣通名杉木湯木槿味苦涼入手足太陰厥陰經功專活血潤燥治腸風瀉血痢後熱渴作飲服令人得睡以肥皂水浸或浸汁磨拌雄黃擦頑癬及蟲瘡良以槿皮二兩酒碗半煎一碗空心服治帶下赤帶用白酒白帶用紅酒最妙川産者佳不宜多服湯劑不入為是烏臼木味苦涼性沉降入手陽明經功專利水通腸功勝大戟療疔腫解砒毒凡患腫毒中砒毒者不拘根皮花葉搗汁多飲得大利即愈蟲瘡以油塗之良虛者忌服子可作燭水楊柳味苦平入手太陰經功專起痘瘡頂陷用枝煎湯浴之神效西河柳味甘鹹平入手太陰經功專消痞解酒利小便療諸風解諸毒痧疹不出嗽喘悶亂以葉為末服四錢疹後痢以沙糖調服最效一名觀音柳一名柳柳皂角味辛鹹性燥氣浮而散入手太陰陽明足厥陰經功專搜風泄熱通關竅而吐痰涎搐鼻立作噴嚏治中風口噤胸痹喉痹除濕去垢消痰破堅殺蟲下胎並治風濕風癩喘腫痰壅堅症囊結得白礬治中風不省人事口噤單服炙灰治老人風祕誤吞鐵物研末服之神效以皂角燒鐵鍋鍋遂碎如粉其化鐵可知去皮子弦或蜜炙酥炙絞汁燒灰柏實為使惡麥冬畏人參苦參皂刺味辛溫功同皂角治腫毒妒乳乳癰汁不出內結成腫名妒乳已潰勿服肥皂莢味辛溫微毒除風濕去垢膩不拘奇瘍惡毒用生者子弦筋搗爛醋和敷立愈不愈再敷奇驗忌鐵棕櫚味苦入足厥陰經功專泄熱收脫得側柏卷柏炙灰存性服之止遠年下血以及吐衄下痢崩帶腸風下血凡九竅流溢及金瘡跌打諸血燒灰塗之即止惟用年久敗棕良與發灰同用尤佳茶葉味苦甘入手足少陰太陰厥陰經功專清心肺滌腸胃得甘菊治頭痛得生薑水滯下酒後飲之引入膀胱腎經患瘕疝水腫空心亦忌之陳細者良吳茱萸味辛苦入足太陰陽明厥陰經功專溫中下氣得乾薑治吞酸得黃連白芍治赤白下利得茯苓治痰飲惟損氣動火昏目發瘡病非寒滯有濕者勿用即有寒濕者亦宜少用開口陳久者良滾湯泡去苦汁止嘔黃連水炒治疝鹽水炒治血醋炒惡丹參硝石畏紫石英蜀椒味辛入足太陰陽明經功專療心腹冷痛傳尸勞疰得地黃汁調養真元得白茯苓補益心腎得烏梅治蛔陰虛火旺之人忌服閉口者殺人宜去之微炒去汗搗去裡面黃殼取紅用名椒紅得鹽良杏仁為使畏雄黃附子防風款冬涼水麻仁中其毒者用涼水麻仁漿解之一名川椒秦産俗名花椒實稍大子名椒目味辛有小毒專行水道不行穀道消水蠱除脹定喘及腎虛耳鳴根辛熱殺蟲煎湯洗腳氣及濕瘡畢澄茄味辛大熱有毒入足太陰陽明經功專治膀胱冷氣得白豆蔻治噎食不納得高良薑治寒厄得薄荷荊芥治鼻塞不通得蓽茇為末擦牙治齒浮熱痛若蜈蚣咬傷畢澄茄嚼敷即愈畢澄茄即胡椒之大者一類二種胡椒殺魚肉鱉菌毒食料宜之多食損肺發瘡蘇木味甘鹹辛平入手足太陰少陰厥陰經功專行血去瘀宣表裡之風得乳香酒服治産後敗血上衝得人參治敗血乘虛入肺挾虛氣喘垂危若刀斧斷指以末敷之外以蠶繭縛好即接虛甚無瘀滯者忌服沉香味辛苦性溫入手足太陰足陽明少陰經功專治氣淋精寒得木香治胞轉不通得肉蓯蓉治大腸虛閉得紫蘇白蔻仁為末以柿蒂湯服治胃冷久厄色黑沉水者良入湯劑磨汁入丸散紙裹置懷中待燥碾之忌火檀香味辛溫入手太陰足少陰手足陽明經功專調脾肺利胸膈去邪惡能引胃氣上升進飲食得丹參砂仁治婦女心腹諸痛降香味辛溫入手太陰經功專療折傷金瘡止血定痛得牛膝生地治吐瘀血為末敷金瘡結痂無瘢怒氣傷肝用代鬱金神效一名紫藤香丁香味辛溫入足陽明經功專去胃寒得甘蔗生薑治朝暮吐得柿蒂治厄逆得五味子治奔豚得生薑治食蟹致傷性熱而燥症非虛寒者忌用雌者為母丁香即雞舌香也畏鬱金忌火乳香味苦辛入足厥陰經功專活血伸筋得枳殼令胎滑易産得辰砂一兩棗仁乳香各五錢酒下治顛狂須恣飲沉醉聽睡一二日勿驚動其疾方愈否則難治加人參名寧志膏得蔥白等分搗敷玉莖痛性黏難研用鉢坐熱水中以燈心同研易細水飛過用一名薰陸香沒藥味苦入足厥陰經功專破血止痛得乳香治跌撲損傷腫痛得虎脛骨治歷節風痛孕婦忌楓脂香味苦入手太陰經功專療癮疹瘋癢得蛤粉薑汁治吐血衄血外科要品一名白膠龍腦香味辛苦入手太陰足厥陰經功專治骨節間風得豬血令心經痘毒宣發於表得硃砂治牙痛得蔥汁治內外痔一名冰片樟腦味辛熱能於水中發火入足厥陰經功專通關利滯除濕殺蟲置鞋底去腳氣得花椒脂麻為末先以退豬水洗過小兒禿瘡然後以末塗之效蘇合香味辛甘溫入手太陰足厥陰經功專通神辟惡得安息諸香蓽茇訶子硃砂犀角治傳尸鬼疰血竭味甘鹹平有小毒色赤入血分入足厥陰經功專散瘀生新專除血痛治金瘡折跌瘡口不合止痛生肌卻能引膿不可多用無瘀積者忌之嵌腳痛及血痔俱以末敷之鼻衄以末吹之均效一名麒麟竭阿魏味辛入足太陰厥陰經功專殺蟲破症闢瘟消瘴得丹砂為丸能截瘧得靈脂黃狗膽治噎膈痞積惟臭烈恐傷胃氣虛者須忌用鉢研細熱酒器上濾過入藥解菌菜及自死牛馬毒蘆薈味苦寒入足厥陰經功專涼膈熱得使君子治小兒脾疳得硃砂治老人風祕得甘草共為末調敷濕癬良胃虛者忌服亦名象膽胡桐淚味苦鹹大寒入足陽明經功專殺蟲軟堅除熱得地骨皮煎湯漱口治牙疳宣露膿血臭氣蕪荑味辛苦入足厥陰經功專殺蟲得訶子治小兒冷痢加豆蔻尤良得檳榔能殺諸蟲陳久氣膻者佳沒石子味苦溫入足少陰經功專澀精固氣強陰助陽止遺淋除泄痢收陰汗烏鬚髮性偏不可輕用一名無食子鬼箭羽味苦寒酸澀入足厥陰經功專破血通經墮胎殺蟲祛祟炙酥用一名衛矛漆味辛溫有毒入足厥陰經功專消瘀破積得白蕪荑治小兒蟲病得牛膝生地治婦女經閉得大麥糵治産後血氣凝腫水疾得柏子山萸棗仁治七傷證血見漆即化為水虛人及慣生大瘡者忌服炒令煙盡為度或燒存性半夏為使畏川椒紫蘇雞子蟹漆得蟹而成水中漆毒者服杉木湯紫蘇湯蟹湯俱可解生漆瘡者煎湯洗之立愈巴豆味辛入手足陽明經功專蕩滌臟腑得杏仁治飛尸鬼疰得亂髮灰治舌上出血得白礬療天絲入咽得雄黃鬱金為丸津咽下名解毒丸治纏喉急痹然系厲劑不可輕用去油名巴豆霜芫花為使畏大黃黃連涼水中巴豆毒者以此解之或黑豆緑豆均佳得火良巴豆一錢石灰拌過人信一錢糯米五分炒研點疣痣黑子荊瀝味甘平入手足太陰足陽明經功專除風熱化痰涎開經絡行血氣治中風失音驚癇痰迷眩暈煩悶消渴熱痢為去風化實痰之妙品薑汁助送則不凝滯竹瀝味甘入手少陰足陽明經功專豁痰下氣得薑汁治中風口噤得葛根汁治小兒傷寒和黃連黃柏黃丹數小兒吻瘡效得茯苓治子煩薑汁為使竹茹味甘入足陽明經功專清熱利氣得栝蔞治傷寒勞復得參苓芩草治産後煩熱剖去青皮用第二層竹葉味甘寒辛淡入手少陰足陽明經功專清心消渴得石膏治傷寒發熱大渴得陳皮治上氣發熱得小麥石膏治時行發黃竹根同葉煎湯洗婦人子宮下脫淡竹葉味甘寒入手少陰厥陰經功專清心得麥冬去煩熱利小便天竹黃味甘微寒入手厥陰經功專涼心去風熱利竅豁痰鎮肝明目功同竹瀝而和緩惟真者難得即竹中黃粉須出南海者雷丸味苦寒有小毒入手足陽明經功專消積殺蟲腹中得應聲蟲非此莫治甘草水浸一宿酒拌蒸或炮用厚朴芫花為使惡葛根又名竹芩
