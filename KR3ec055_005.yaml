body:
  text: 卷五五穀部粳米味甘平入手足太陰陽明經功專和胃補中得石膏附子皆取其留中也惟北粳白粳陳粳涼赤粳新粳熱南粳溫且有早中晚三收晚者得金氣多尤能清熱凡人嗜生米久成瘕治以雞屎白即愈米泔古名米瀋第二次者清而可用清熱止煩渴利小便涼血陳倉米味鹹入手陽明經功專補中益氣得人參治脾虛泄瀉得沉香治胃反噎塞若一切惡瘡百藥不效者以陳倉米炙灰麻油調敷即愈杵頭糠味辛甘入足陽明經功專治膈氣噎塞得人參石蓮治咽喉不利糯米味甘溫入手足太陰陽明經功專補脾肺虛寒堅大便縮小便收自汗發豆瘡同龍骨牡蠣為末撲汗良然性黏滯病人及小兒忌之穀芽味甘溫入手足太陰陽明經功專開胃醒脾下氣和中消食化積炒用得砂仁白朮能使人進食婦人食之斷乳飴糖味甘溫入手足太陰陽明經功專補中益氣健脾化痰潤肺止嗽中滿吐逆酒病牙疳咸忌腎病尤不可服誤吞稻芒頻食飴即愈按用之建中得桂枝為良秈米味甘溫入手足太陰經功專益氣補中和脾養胃除濕止泄稷味甘平入手足太陰陽明經功專益氣和中宣脾利胃即黍之不黏者莖治通身水腫煎湯浴效黍味甘溫入手足陽明太陰經功專益氣補中即稷之黏者久食發熱根治心氣疼痛煎湯服良粱味甘入手足太陰陽明經功專益氣和中除煩渴止霍亂下利利大小便惟黃粱平白粱青粱微涼黃粱尤得土氣之中和較他谷最益脾胃粟之大者為粱手足生疣白粱米粉鐵銚炒赤研細以眾人唾和塗之厚寸許即消粟味鹹淡微寒入手足太陰少陰經功專補虛損益丹田開脾胃利小便治反胃熱痢粱之小者為粟小兒重舌嚼哺之效秫味甘微寒入手太陰經功專治肺瘧得半夏治不能寐雜安胎藥中治妊娠下黃汁粱米粟米之黏者為秫即糯黃米也以為粉炒熟用沙糖拌食治胃弱泄穇子味甘澀入手足太陰陽明經功專補中益氣厚腸胃濟飢一名龍爪粟又名鴨爪稗蜀黍味甘澀溫入手足太陰陽明經功專溫中澀腸胃止霍亂黏者與黍米同功一名高粱一名蘆穄俗名蜀秫又名蘆粟玉蜀黍味甘平入手足陽明經功專調中開胃根葉治小便淋瀝沙石痛不可忍一名玉高粱菰米味甘冷入手足陽明經功專止渴解煩熱調腸胃可療飢一名茭米東牆子味甘平入手足太陰厥陰經功專益氣輕身久服不飢堅筋骨能步行可為飯食蓬草子味酸澀平入手足太陰陽明經功專療飢作飯食不飢無異粳米菵草子味甘寒入手足陽明經功專去熱利腸胃益氣力久食忘飢一名守氣生蒒草子味甘平入手足太陰陽明經功專補虛羸損乏溫腸胃止嘔逆久食健人輕身不飢稗味甘苦微寒入手足太陰陽明經功專益氣宣脾曹植曾有芳菰精稗之稱金瘡出血不已搗敷或研末摻之即止甚驗薏苡仁味甘淡入足陽明經功專去寒濕筋攣得麻黃杏仁治風濕周痹得郁李仁治水腫喘急以豬肺蘸末服治肺痿肺癰咳吐膿血多食薏仁令人健飯大便燥結因寒筋急勿用其力緩必須倍於他藥炒研御米殼味澀平酸入足少陰經功專止瀉得烏梅治久嗽不止得陳皮烏梅治熱痢便血瀉痢初起及風寒作嗽忌用一名麗春花凡使殼洗去蒂及筋膜取薄皮醋炒或蜜炒得醋烏梅陳皮良阿芙蓉味酸澀入手足太陰陽明少陰經功專澀精固腸得木香黃連治久痢不止此即嬰粟花之漿俗作鴉片煙貽害無窮御米即其子甘寒潤燥煮粥食治反胃加人參良黑大豆味甘寒色黑入手足少陰厥陰經功專補腎鎮心明目得牯牛膽治肝虛目暗得天花粉治腎虛消渴得獨活治產後中風搗塗一切腫毒煮食利大便緊小者入藥更佳鹽水煮食尤能補腎畏五參龍膽豬肉忌厚朴得諸膽汁石蜜牡蠣杏仁前胡良卒然中風不語大豆煮汁煎稠如飴含之並飲汁治喉痹黃大豆味甘溫入手足太陰陽明經功專寬中下氣利大腸消水腫凡痘毒生在要處恐致殘疾令其母嚼爛生黃豆厚敷之即消另生他處豆油辛甘熱微毒塗瘡疥解發䐈白豆味甘平入手足太陰陽明經功專補五臟暖腸胃調中葉煮食利五臟下氣赤小豆味甘酸平入手少陰太陽經功專散血利水得桑皮去濕腫得通草能下氣得雞子敷癰瘍同鯉魚煮食消水腫凡外瘍潰爛為末敷之立效性極黏入苧根末則不黏止渴解酒通乳汁下胞胎久食令人瘦半紅半黑者名相思子一名紅豆苦平有毒吐心腹邪氣風痰瘴瘧蟲蠱毒研二十七枚服綠豆味甘寒入足太陰陽明通行十二經功專解金石草木毒得黑大豆黑小豆治天行痘瘡得白麻骨治不寐功在綠皮去皮即壅氣去浮風而潤膚利小便以治脹厚腸胃以和脾痘瘡潰爛以豆粉撲之良手足折傷以豆粉新銚炒紫色井水調厚敷紙上貼傷處復用杉皮扎住其效如神惟胃寒者忌豌豆味甘平入足陽明經功專治吐逆泄痢消渴腹脹研末塗癰腫痘瘡蠶豆味甘澀溫入手足太陰陽明經功專補中益氣澀精實腸發芽則全不閉澀香甘可口誤吞針入腹以蠶豆同韭菜多食之莫食別物其針自由大便出甚驗亦有胡桃肉同食者取其速下也豇豆味澀平入手太陰經功專散血消腫清熱解毒治消渴吐逆泄痢便數解鼠莽毒白扁豆味甘入手太陰經功專下氣消暑得香薷治霍亂吐利得天花粉消渴炒研米湯調服治赤白帶傷寒邪熾者勿服用皮勝於用肉以皮清暑而不壅氣若用之補脾則皮肉全用為是穭豆味苦澀溫入手足太陰陽明經功專健脾胃治賊風風痹俗名馬料豆刀豆味甘溫入手足陽明經功專溫中下氣利腸胃益腎歸元取子燒存性白湯調下治呃逆神效黎豆味甘微苦溫有小毒入手足太陰經功專溫中益氣多食發悶一名貍豆以豆作貍首紋故名淡豆豉味苦寒入手太陰經功專泄肺清熱下氣調中得蔥則發汗得山梔則吐得鹽亦吐得酒治風得薤治痢得蒜止血炒熟又能止汗若傷寒直中三陰與傳入陰經及熱結胸煩悶宜下不宜汗者均須忌服大豆卷味甘平入足陽明經功專除胃中積熱消水病脹滿破婦人惡血療濕痹筋攣膝痛小兒撮口初生豆芽研爛絞汁和乳灌少許即愈豆腐味甘鹹寒入手足太陰陽明經功專清熱散血和脾胃消脹滿下大腸濁氣中其毒者以萊菔子湯解之蒸餅味甘平入足太陰陽明經功專消穀利水得大蒜淡豆豉為丸治久淋小麥味甘微寒入手少陰經功專養心鎮肝得通草治老人五淋得海藻消項下癭氣麩醋拌蒸散血止痛熨腰腳折傷風濕痹痛寒濕腳氣五易至汗出良浮小麥味鹹涼止虛汗盜汗勞熱骨蒸即水淘浮起者焙用麥奴即麥將熟穗上有黑黴其黑黴名麥奴取之治陽毒溫毒渴熱發狂以及溫瘧甚效陳麥柴堆在露天者最好用三五根洗淨泥剪寸許長煎服治難產神效大麥味甘鹹微寒入手足太陰陽明經功專補虛勞壯血脈益顏色實五臟益氣調中除熱止泄療消渴化穀食石蜜為使面平胃寬胸下氣消積療纏喉風作粥食良得針砂沒石子能染須杆得釭豆荸薺煮食治春夏受濕漸成胸悶肚大如鼓神效麥芽味鹹入足太陰少陰厥陰經功專消食下氣產後退乳得川椒乾薑治谷勞嗜臥得蜜能下胎乳脹欲成癰單用一二兩炒煎服立消並消果食積麥粉味甘涼入手足太陰厥陰經功專和五臟調經絡醋熬成膏消一切癰腫湯火傷俗名小粉麵筋味甘涼性黏濘食之難消炒煎熏炙助火傷陰病人及小兒宜忌櫎麥味甘微寒入手足太陰經功專補中除熱久服力健蕎麥味甘寒入手足太陰陽明經功專降氣寬腸治腸胃沉積泄痢帶濁敷痘瘡潰爛湯火傷虛寒者忌食以荸薺汁同蕎麥調敷腳雞眼三日雞眼疔即拔出甚驗頭風風眼蕎麥粉作餅貼眼四角以米大艾炷灸之神效胡麻味甘辛入足少陰手陽明經功專潤燥得桑葉逐風濕堅筋骨得苦參蒺藜治大瘋疥癩屢驗皮肉俱黑者良精氣不固者宜忌一名脂麻一名巨勝子又有所謂壁蝨胡麻者一名亞麻治大瘋疥癩以此為最大麻仁味甘入手陽明足太陰經功專緩脾潤燥得當歸厚朴等辛藥乃能利大腸卒被毒箭搗爛煮汁飲赤遊丹以之塗敷均效並能催生通乳惟腸滑者忌服畏牡蠣白薇茯苓一名火麻神麯味甘辛入手足太陰陽明經功專化水穀運積滯得麥芽杏仁治胃虛不克得蒼朮能壯脾進飲食得茱萸治暴泄不止得木香消糕粽積脾陰虛胃火盛及有孕者忌服紅曲味甘溫入營而破血燥胃消食忌同神麯陳者良醬味鹹冷利入手足太陰陽明少陰經功專殺百藥及熱湯火毒並一切魚肉蔬菜蕈毒入藥當用豆醬陳者佳醋味酸苦溫入足厥陰經功專散瘀治產後血逆得耆芍桂枝治黃汗得麻黃清酒治黃疸得木香治心痛得黃柏治口瘡調荔枝核末塗瘰癧結核殺魚肉毒多食損筋骨米醋良一名苦酒衣沾藥汁以醋洗之即去酒味甘苦淡入手足太陰陽明厥陰經功專升散和藥煎服用為嚮導可以通行一身之表引藥至極高之分熱飲傷肺溫飲和中少飲和血行氣壯神禦寒辟邪逐穢暖水臟行藥力過飲傷神耗血損胃爍精動火生痰發怒助欲及生濕熱諸症燒酒之損人尤烈醇而無灰陳久者佳畏綠豆粉枳椇子葛花鹹鹵
