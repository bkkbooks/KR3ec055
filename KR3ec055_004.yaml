body:
  text: 卷四蔬部韭菜味辛溫微酸入足厥陰經功專溫脾益胃止瀉痢而散逆冷助腎補陽固精氣而暖腰膝散瘀血逐停痰入血分而行氣治吐衄損傷一切血病以生蟹與韭菜搗爛童便黃酒煎服治跌打損傷神效得薑汁牛乳治反胃噎膈得桔梗治死血留胃中作痛得五芩散為丸茴香湯下治腎氣上攻致心腹作痛多食昏目忌蜜百蟲入耳韭汁灌之即出聤耳出水韭汁日滴三次效漆瘡作癢韭葉杵敷之立愈韭子味辛甘溫入足少陰厥陰經功專補肝腎得龍骨桑螵蛸治遺尿泄精溺血白帶白淫等症下部有火陰氣不固者勿服每日空心生吞草粒鹽湯下治夢遺溺白燒熏蟲牙痛良韭花食之動風蔥白味辛散平入手太陰足陽明經功專發汗解肌通上下陽氣得附子乾薑人尿豬膽汁治面赤格陽於上熱藥不入得香豉阿膠治胎動若患外痔先用木鱉煎洗以蔥涎對蜜調敷其涼如冰數次即愈蔥管吹鹽入玉莖中治小便不通及轉脬危急者極效以蔥白安臍上尉陰毒腹痛並燒灰塗折傷止痛無般以莖葉煎湯頻洗水病足腫奇效能解藥毒魚肉毒蚯蚓毒塗猘犬傷同蜜食毒如砒同大棗犬雉食令人病薤白味苦辛溫入手太陰陽明經功專散滑利散結得栝蔞半夏治胸痹刺痛若中惡猝死即搗汁灌鼻中奔豚氣痛搗汁飲神效忌牛肉大蒜味辛溫入手足太陰陽明經功專開胃健脾通五臟達諸竅搗爛麻油調敷消癰腫破症積搗和地漿溫服治中暑不醒搗貼足心治鼻衄搗納肛門治關格不通敷臍消水利大小便切片灼艾炙一切外瘍邪痹腫毒得黃丹止瘧然性熱氣臭生痰動火散氣耗血昏目損神伐性有熱者切勿沾唇忌蜜蕓薹味辛溫入手足太陰經功專散血消腫搗貼遊風丹腫乳癰難産神效多食動疾發瘡子治婦人血刺小腹痛不可忍微炒加桂心一兩良薑半兩為末醋糊丸梧子大每淡醋湯下五丸神效油殺蟲一名油菜白芥子味辛溫入手足太陰經功專通行經絡發汗散寒溫中開胃利氣豁痰研末酒服一錢治反胃上氣與白芷等分為末薑汁和塗腳氣腫痛神效有瘡瘍痔疾便血者俱忌芥菜子主治略同萊蔔子味辛溫平入手太陰經功專長於利氣生用吐風痰散風寒發瘡疹炒熟定咳嗽痰喘調下痢後重止內痛消食除膨虛弱者忌服得生薑搗汁入麝少許搐鼻內治年久頭風萊蔔味辛甘平生食升氣熟食降氣入手太陰經功專寬中消食化痰瘀散治吐衄咳嗽吞酸利二便解酒毒制面毒豆腐積生搗塗跌打湯火傷噤口痢及老人痰喘瓦罐燉熟淡食良反首烏地黃忌薑以薑能制其毒多食耗氣滲血同生地食令人白鬚發生薑味辛溫入手太陰足陽明經功專散邪和中得大棗和營衛得附子溫經散寒得杏仁下胸膈冷氣得露水治暑瘧殺半夏南星菌菌野禽毒闢露霧山嵐瘴氣葉搗汁飲消食鱠成症薑汁味辛溫潤入手太陰足陽明經功專治噎膈反胃得童便治痰中暴卒合黃明膠熬膏貼風濕痹痛薑皮味辛涼入足太陰經功專和脾行水治浮腫脹滿得茶治痢熱痢留皮冷痢去皮大妙煨薑味辛入手少陰手足太陰陽明經功專和營衛不散不燥與大棗並用行脾胃之津液乾薑味辛熱入手少陰足太陰經功專逐寒邪而發表溫經燥脾濕而定嘔消痰同五味利肺氣而治寒嗽開五臟六腑通四肢關節宣諸絡脈治冷痹寒痞反胃下痢腹痛癥瘕積脹開胃扶脾消食去滯母薑曬乾白淨結實者良黑薑味辛苦大熱入手足太陰陽明經功專去惡生新使陽生陰長得芎歸甘草紅花名生化湯為産後去瘀要藥惟性易僭上凡以之治中宜佐大棗多服損陰傷目孕婦尤忌胡荽味辛溫微毒入足太陰陽明經功專消穀止頭痛通小腹氣及心竅利大小腸其香竄闢一切不正之氣痧疹痘瘡不出煎酒噴之除頭面勿噴蓋覆令暖即出並取汁塗赤丹煎湯洗面上黑子久食損神令人多忘病人食之腳軟一名蒝荽蔓荊子味辛平瀉熱解毒入手太陰足厥陰經功專利水明目搗服治黃疸腹脹和蜜服治癥瘕積小兒血痢醋調末敷禿瘡鹽調末敷乳癰蜘蛛咬毒根解酒毒並敷陰囊腫大如斗神效葉利五臟消食下氣治嗽若飛絲入眼用葉揉爛滴汁三兩點自出一名諸葛菜胡蘿蔔味甘平入手足陽明經功專寬中下氣散腸胃滯氣元時始自胡地來氣味似萊蔔微有羊臊氣有黃赤二種子似蒔蘿可和食料以鍋底灰煨之去外皮治痰喘並治時痢水芹味甘平入手足太陰陽明經功專去伏熱及頭中風熱利口齒及大小腸治煩渴崩中帶下五種黃病小便出血搗汁煎服愈旱芹味甘寒入足陽明厥陰經功專除心下煩熱下瘀血止霍亂凡結核氣旱芹曬乾為末油煎成膏摩之日三五度便愈蓬蒿菜味甘辛涼入足太陰陽明經功專安心氣和脾胃消痰飲利腸胃白菜味甘平入手足陽明經功專利腸胃除胸中煩解酒消渴食下氣治瘴氣止熱嗽和中利大小便搗生汁敷小兒赤遊丹漆毒均效黃芽菜尤美而益人一名菘菜山東直隸者最佳菠菜味甘冷滑入手太陽陽明經功專通腸利臟得雞肫皮治消渴引飲薺菜味甘溫入手少陰太陰足厥陰經功專利五臟益肝和中根益胃明目治目痛同葉燒灰治赤白痢極效蜜湯調子明目名蒫實又名菥蓂子花治久痢為末棗湯服布席下闢諸蟲釋家取其莖作挑鐙杖可闢蚊蛾謂之護生草即此莧菜味甘冷入手足陽明經功專除熱通九竅利腸滑胎治初痢忌同鱉食子明目馬齒莧味酸寒入手陽明足厥陰經功專散血解毒祛風殺蟲合雞子白煎服治赤白帶下痢小便熱淋以之搗汁飲即愈煎膏塗禿瘡濕癬惡瘡良丹毒搗汁飲以滓塗之利腸滑胎子治青盲及目中出淚出膿亦忌魚鱉生菜味苦寒入手少陰太陰足厥陰經功專利五臟通經脈開膈寬胸解熱毒酒毒止渴利腸魚臍瘡頭白痛甚以針刺破頭將白苣汁滴孔中良一名白苣萵苣味苦冷微毒入手少陰經功專通乳汁殺蟲蛇毒小便不通搗葉敷臍上良翹搖味辛平入手足太陰陽明經功專利五臟明耳目去風熱止熱瘧即巢菜俗名花草其子活血明目藥店以此子偽充沙苑疾藜性殊蓴菜味甘寒滑入足太陰陽明經功專消渴熱痹熱疽逐水解百毒羊蹄菜味苦寒入手少陰經功專治産後風祕搗汁入水半盞煎之空心溫服頭風白屑以根杵同羊膽汁塗之永除即禿菜菾菜味甘苦涼滑微毒入手足太陰經功專療時行壯熱搗汁服並敷禽獸傷食之動氣冷氣人食之必瀉子醋浸揩面去粉刺潤澤有光一名善逵菜又名莙薘菜黃瓜菜味甘微苦寒入手陽明經功專通結利腸一名黃花菜魚鯹草味辛微寒有小毒入手太陰經功專散熱毒癰腫瘡痔脫肛斷痁疾解砒毒敷惡瘡白禿搗汁入陳久芥菜滷飲之治肺癰神效多食令人氣喘蕨草味甘寒滑入手少陰太陽經功專去暴熱利水道芋味辛平滑有小毒入手足陽明經功專寬胃通腸和魚煮食下氣調中土芋味甘辛寒有小毒入手足陽明經功專厚腸胃生研水服解藥毒俗名香芋山藥味甘入足太陰經功專健脾得羊肉補脾陰得熟地固腎精以礬水煮山藥曬乾同茯苓等分為末治小便數山藥半生半炒米飲下治噤口痢忌與面同食甘薯味甘平入足太陰經功專補虛乏益氣力健脾胃強腎陰即山薯百合味甘苦入手少陰太陰經功專清肺得款冬花治痰嗽帶血獨用煎服治百合病及吐血竹筍味甘微寒入手太陰足陽明經功專利膈下氣化熱爽胃消痰虛人及小兒不宜多吃因其滑腸痘症尤宜忌之茄子味甘寒而利入手足太陰陽明經功專散血寬腸動風發病多食傷子宮老黃茄子治乳頭裂根煎汁洗凍瘡折蒂燒灰治口瘡俱獲奇效以鮮茄蒂鮮首烏等分煮飲治對口瘡神驗以馬尿浸根三日酒炒為末點牙即落一名落蘇壺盧味甘平滑入手太陰足陽明經功專利水通小便治腹脹黃腫以亞腰壺盧連子燒存性每服一個食前溫服或白湯下十餘日必愈一名匏瓜俗名葫蘆冬瓜味甘寒入手太陰足太陽經功專瀉熱益脾利二便消水腫止消渴散熱毒癰腫去皮切片酒水煮爛去渣熬濃每夜塗面變黑為白光澤異常子補肝明目瘧疾寒熱腸胃內壅最為要藥葉焙研敷多年惡瘡一名白瓜南瓜味甘溫入手太陰經功專補中益氣與羊肉同食令人氣壅瓜蒂一個燒存性研末拌炒米粉食每日一個食數次治胎滑奇效越瓜味甘寒入手足陽明經功專利腸胃去煩熱解酒毒胡瓜味甘寒有小毒入手足太陰經功專清熱解渴利水道根搗數狐刺腫毒奇驗一名黃瓜絲瓜味甘冷入足厥陰經功專涼血解毒除風化痰通經絡行血脈得槐花治陽風下血得蘆根桃仁治癰痘瘡出不快者燒存性入硃砂蜜水調服良一名曰天羅一名蠻瓜茭白味甘冷入手足太陰經功專利五臟去煩熱除目黃解酒毒利二便治酒皶面赤白癩瀝瘍風熱目赤惟滑利而冷甚不益人宜少吃為妙有病者尤忌實名雕胡米飢可作糧紫菜味甘寒咸入手太陰經功專消癭瘤積塊治熱氣煩塞咽喉多食令人腹痛發氣吐白沫飲熱醋少許即止海粉味甘寒咸入手太陰足陽明經功專清堅頑熱痰消癭瘤積塊治熱煩養陰氣石花菜味甘鹹大寒滑入手足太陰陽明經功專去上焦浮熱發下部虛寒龍鬚菜味甘寒微咸入足太陽太陰經功專清熱消癭利小便木耳味甘平有小毒入手足陽明足厥陰經功專利五臟宣腸胃治五痔及一切血證生古槐桑樹者良柘樹者次之地耳甘寒明目石耳甘平明目益精香菌味甘平入足厥陰經功專破血治風松菌治溲濁不禁蘑菰味甘寒入手足太陰經功專益腸胃理氣化痰土菌一名地菌有毒燒敷瘡疥良雞㙡味甘平入手足太陰經功專益胃神於治痔一名雞菌出雲南沙地者較他處佳廣西出者名雷菌
