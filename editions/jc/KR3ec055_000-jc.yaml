body:
  text: 序一陳君蕙亭吾浙振奇士也居鄉試文字不得志乃去而以末秩試吏於吳中仍落落寡所合自少嘗讀黃帝書能盡百藥之性以之療人病輒效意不欲私其能也需次多暇乃輯為本草撮要一書將傳諸世俾人人知藥之所以中於病者第不違其性舉一世可無疾痛疴癢之患官不足以濟世而托之醫其願宏其術精矣余今年秋始以吳中長吏之招來襄理學堂事君稔之徶㣯過訪袖出其書眎余余懵於醫願讀其書百藥之情狀洞若觀火彌爽心目因衋然有感於吾學堂之生徒其賢者猶壯夫之不待藥也而世俗囂張狂誕之習方盛譬如時行沴厲往往感人而易病欲亟治之而苦未得其藥君儻別有肘後之秘能惠我以為生徒療者乎今學堂生徒將儲為他日療國之醫者也生徒之病必先療而後可以言療國君果別有術焉蓋即視此書例亦一一條舉夫藥之中於病者而更有以眎我乎光緒辛丑臘月之望鮮民張預謹書於吳門中西學堂之東書樓下序二醫師之用藥猶大將之用兵兵不得力將罔克成功藥不得力病罕有起色行軍辨主客要害用藥分君臣佐使醫門多疾未有藥性不明而能著手奏效者也神農本草經尚已李時珍綱目粲然大備而恆用之藥不過數百味不用則失傳存其名而無其物近有本草備要本草從新二書盛行於世而繁簡失當主治之法與前賢不相吻合識者譏焉吾友平邑陳君蕙亭儒而醫者也衙官屈宋與余需次吳門朋簪賓榻昕夕晤對者有年省垣設官醫局蕙亭董其事活人無算臨症療治之暇手輯本草撮要一書其自序云以藥為經以方為緯視備要略增視從新稍減見者以為善本勸付梓以廣其傳余辭官養疴日坐經卷藥爐之側略知醫理以視蕙亭之用藥如用兵學有專精益瞠乎後矣光緒十有三年丁亥暮春之月系姓愚弟翰芬撰序三本草曰古經以下代有增訂惟考覈精詳簡明切要之善本卒不可覯予友陳君蕙亭浙東平湖之望族文行藉藉庠序間少年因不得志於帖括值𤞑匪不靖遊幕雍梁以筆墨勷辦軍務為當道所器重中年後以巡宰需次吳門與予在醫局朝夕從事十有二年以手輯本草撮要兩冊見示言簡而明藥約而備洵醫林之捷徑後學之津梁也倘付之手民公諸同好俾習醫者置之案頭便於檢閱即不習醫者亦置一編備為觸寒冒雨之需卻病攝生之助斯功正未可量又豈僅在醫局施診而已哉予於陳君有厚望焉因綴數語於簡端光緒十九年中秋後五日山右靈石李鏡涵書自序余質愚魯明知學醫非有記性悟性斷不能洞悉精微隨機應變以療人疾無如嗜醫之心已歷三十餘年未嘗或倦因之博採古今各大家所著方藥刪繁就簡注於每藥之下某藥某味某性入某經專治某病與某藥同用治某病並將治某病宜生用熟用炙用炒用研用獨用以及某藥與某藥相佐相惡相畏相反相須相殺逐一註明不加臆說現值醫局從公之暇次第錄成置之案頭以便查閱聊資記性悟性之不足若云藉此已能洞悉精微隨機應變以療人疾則吾豈敢光緒十二年六月既望當湖陳其瑞蕙亭識是編之輯亦猶楊氏之鉤元約劉氏之本草述而剃其繁蕪但初不知有鉤元之刻迨輯成後始得而讀之不意拙輯竟如復剃鉤元繁蕪者抑亦奇矣目次因水火土部未能與草木等部一律故附卷尾藥品比備要略增較從新稍減主治悉遵經旨體裁無異鉤元以藥為經以方為緯撮其大要亦可舉一反三若欲必究其全則自有諸家書在蕙亭又筆
