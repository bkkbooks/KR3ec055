body:
  text: 卷三果部大棗味甘微苦辛酸鹹氣香入足太陰陽明經功專和營得生薑則和衛治瘧疾得小麥甘草治臟燥悲傷諸瘡久壞不愈以棗膏煎洗效食棗閉氣食椒即解中滿及風疾痰熱齒痛小兒疳病均忌殺烏附毒忌與蔥魚同食杏仁味甘苦入手太陰經氣分功專散結潤燥得門冬能潤心肺得柿餅治肺病咯血得童便能補肺劫勞得陳皮治氣閉晝便難其性毒能殺蟲治瘡制錫狗毒消狗肉積因虛而咳嗽便閉者忌之雙仁者殺人去皮尖炒研發散連皮尖研得火良惡葛根黃芩黃耆杏子肉酸熱孕婦忌食巴旦杏仁味甘平入手太陰經功專降逆有濕痰者勿服得麻黃甘草治諸忤烏梅味酸澀溫入手足厥陰太陰經功專斂肺固腸解渴止吐得建面乾薑治休息痢得黃蓮灶下土等分為末茶調服治血痢若大便不通氣奔欲死以烏梅數顆湯浸去核丸棗大納入下部少時即通疽愈後有肉突起燒灰存性研末敷之即平若痰厥僵仆牙關緊閉取肉揩牙齦涎出即開若過食酸梅齒齼者嚼胡桃肉即解衣生黴點者梅葉煎湯洗之即去清水揉梅葉洗蕉葛衣經夏不脆桃仁味苦甘辛入手足厥陰經血分功專破瘀潤腸止心腹痛得吳茱萸治冷勞減食得延胡索川楝子治肝厥胃脘痛婦人陰癢杵桃仁綿裹塞之陰腫敷之立效瘧疾寒熱以桃仁一百枚去皮尖置缽內研成膏不得犯生水入黃丹三錢丸梧子大每服三丸當發日面北溫酒下合此丸須端午午時忌婦人雞犬見慄味甘鹹溫入足太陰少陰經功專厚腸胃補腎氣多食閉氣小兒疳瘡生嚼敷之良並止鼻衄塗筋骨碎斷消腫痛行瘀血風乾者佳殼止便血殼內薄皮治骨鯁俱燒灰存性用梨味甘微酸寒入手太陰經功專清熱嗽止渴潤肺涼心得黑穭豆治痰喘氣急得丁香治反胃切片貼湯火傷脾虛而瀉者忌乳婦及金瘡勿食搗汁熬膏良加薑汁蜜尤佳清痰止嗽與萊菔相間收藏則不爛取汁點眼消赤腫胬肉神效柿味甘冷入手太陰少陰經功專潤肺止嗽清胃理煩乾柿甘寒澀腸止泄消宿血治熱咳反胃以之燒灰每服二錢治下血柿霜生津化痰治咽喉口舌痛柿性頗寒肺經無火及寒咳冷痢滑泄者忌之若與蟹同食腹痛作瀉柿蒂得丁香生薑開鬱散痰治呃逆不止從治之法則然試之頗驗木瓜味酸入足太陰厥陰經功專去濕痹腳氣霍亂轉筋腰足無力多食損齒骨病癃閉陳者良木瓜切片鋪席上可闢治壁蝨為末以鱔魚身上涎調貼反花痔瘡甚效山楂味酸甘微溫入足太陰厥陰經功專消食起痘得茴香治偏墜疝氣得紫草治痘疹乾黑得沙糖去惡露治少腹痛脾虛惡食者忌服凡用人參不宜者服山楂即解化肉積甚速凍瘡塗之即愈治疝催生用核良橘皮味苦辛入足陽明太陰經功專利氣止嘔得白朮補脾得甘草補肺得杏仁治大腸氣閉亦治腳氣衝心得桃仁治大腸血閉得生薑治嘔噦厥冷得神麯生薑治經年氣嗽得麝香治婦人乳癰得半夏治濕痰童便浸治痰咳薑汁炒治痰積寒痰鹽水炒入下焦蜜炙入中焦橘核味苦入足厥陰經功專行肝氣消腫散毒腰腎疼痛得荔核治疝酒炒良葉散乳癰橘絡味淡微苦入足少陰經功專通經絡滯氣脈脹驅皮裡膜外積痰青皮味辛苦溫色青氣烈入足厥陰經功專疏肝瀉肺治肝氣鬱積脅痛多怒久瘧結癖疝痛乳腫發汗有汗及氣虛人禁用醋炒用葉治胸膈氣逆消腫散毒婦人妒乳內外吹乳岩乳癰用之皆效佛手柑味苦酸溫入手足太陰經功專理上焦氣而止嘔進中州食而健脾除心頭痰水治痰氣咳嗽心下氣痛獨用損氣宜與參朮並行陳久者良一名香櫞古名枸櫞香欒味甘酸辛平入手足太陰陽明經功專下氣消食快膈化痰解酒毒治飲酒人口氣去腸胃中惡氣散憤懣之氣能療妊婦不思食虛而無滯者禁孕婦氣虛勿與花紅味酸澀甘溫入手足太陰陽明經功專生津治消渴泄精水痢小兒閃癖為末和醋敷瘰癧良多吃發熱閉百脈枇杷葉味苦入手太陰經功專下氣止嘔得茅根治瘟病發嘔得山梔治赤鼻面瘡得丁香人參治反胃嘔噦得款冬紫菀杏仁桑皮木通少加大黃蜜丸治肺熱久嗽身如火燎肌瘦將成勞去毛用治胃病薑汁塗炙黃治肺病蜜水炙黃枇杷味甘酸平入手太陰經功專止渴下氣利肺氣止吐逆除上焦熱潤五臟多食發痰熱傷脾同肉及熱麵食令人患熱黃疾楊梅味酸甘溫入手足太陰厥陰經功專去痰止嘔生津燒灰服斷下痢多食發熱衄血忌與生蔥同食石榴皮味酸澀溫入手太陰足少陰經功專澀腸止痢便血崩中帶下之病合陳壁土少加明礬煎洗脫肛再以五倍子研末敷而托上之良點眼止淚塗瘡拔毒銀杏味甘苦入手太陰經功專收澀熟食溫肺益氣定痰哮斂喘嗽縮小便止帶濁殺蟲去蝨麻黃一錢銀杏十枚治喘效多食壅氣一名白果葉闢諸蟲胡桃味甘入足陽明手太陰經功專補命門暖丹田得杏仁治喘嗽得骨脂補下焦陽虛與姜同嚼噙咽治寒嗆同蔥薑茶搗煎發汗散寒肺熱火熾者忌潤燥去皮斂澀連皮油者殺蟲以油調冰片少許滴耳中治耳內生耳聤殼外青皮烏須荔枝核味甘溫澀入足太陰厥陰經功專散滯氣闢寒邪得香附治胃脘痛婦人血氣痛得茴香青皮治㿗疝卵腫加酒服尤妙無寒濕滯氣者勿服燒存性用荔枝甘酸熱連皮核燒存性為末白湯調下治呃逆殼發痘瘡並解荔枝熱荔核多吃損齒有火者忌龍眼肉味甘平潤入足太陰厥陰經功專補心長智悅胃培脾療健忘與怔忡能安神而熟寐一切思慮過度勞傷心脾血不歸脾諸症凡受風寒者忌橄欖味甘澀平入手太陰經功專清肺開胃下氣除煩生津解酒利咽喉解河豚毒每日以核兩個磨汁拌沙糖吃兩年之後永不出痘奇驗磨核汁治魚骨哽仁研塗唇燥裂榧子味甘澀平入手足陽明經功專殺蟲消積多食引火入肺反綠豆寇氏云多食潤腸海松子味甘溫香入手太陰陽明經功專潤肺開胃散水氣除諸風得胡桃加倍煉蜜為丸或同服治肺燥咳嗽得柏子仁麻仁溶蠟為丸名三仁丸治虛秘黃耆湯下有濕痰及便溏精滑者忌枳椇味甘平入手太陰經功專止渴除煩得麝香解酒毒多食發蛔蟲一名木蜜俗名雞距入酒酒化為水落花生味辛甘香入手太陰經功專潤肺補脾和平可貴多食生痰甜瓜味甘寒入足太陽陽明經功專清煩止渴解暑泄胃滑腸瀉者忌吃瓜蒂味苦寒有小毒入足陽明經功專引吐得淡豆豉赤小豆吐中有散葉搗汁塗頭生髮偏頭痛以瓜蒂曬乾生研末納鼻中出黃水即愈甜瓜蒂也西瓜味甘寒入手太陰足陽明經功專解暑除煩利便醒酒止渴清熱有寒濕者勿食瓜子殼治吐血腸風下血甘蔗味甘入足太陰陽明經功專潤肺生津得薑汁治反胃得麥冬生地治春溫液涸以皮曬乾生研麻油調塗禿瘡良中滿滑瀉者勿食白沙糖味甘溫入足太陰經功專補脾緩肝潤肺和中消痰治嗽堅白如冰者為冰糖食韭口臭糖湯可解紫沙糖味甘溫入足太陰陽明經功用與白相仿惟白者炎上紫者達下產後同益母草膏和服下惡露蓮子味甘平而澀入足太陰少陰經功專清心固腎得乳香益智治遺精白濁得炙草治赤濁得陳倉米治噤口痢大便燥者勿服去心皮蒸熟焙乾得枸杞白朮山藥茯苓良石蓮子味苦入手少陰經功專清心除煩開胃進食治噤口痢淋濁諸證無濕熱而虛寒者勿服蓮蕊須味甘平澀入足少陰經功專清心澀精得黑牽牛當歸治久近痔漏得黃柏治欲火夢遺小便不利者勿服藕衣節味澀平入手少陰足陽明厥陰經功專消瘀血得發灰治血淋得酒可解蟹毒和地黃搗汁熱酒童便飲治產後血悶得梨汁治上焦痰熱熟搗塗坼裂凍瘡蓮花貼天泡濕瘡神效敗蓮房味澀入足厥陰經功專消瘀血得厥陰經藥治大便下血荷葉味苦平入足太陰陽明經功專升少陽生氣得升麻蒼朮治雷頭風得殭蠶胡荽治痘瘡倒陷獨用葉炙灰酒服治遺精虛者禁用紫背荷葉主治同上而功益捷菱角味甘寒入足陽明經功專安中消暑止渴解酒食菱傷者服酒或薑汁即愈芡實味甘澀入手太陰足少陰經功專暖元陽得生地止血得金櫻子澀精得菟絲子實大便大小便不利者勿服荸薺味甘寒滑入足太陰陽明經功專消食攻積除胸中實熱治五種噎膈消渴黃疸血症蟲毒能毀銅得陳海蟄煎湯服消胸中頑痰通大便小兒口瘡炙灰敷之良性涼不可多吃孕婦大忌慈菇味苦甘微寒入足太陰厥陰經功專解百毒產後血悶攻心欲死產難胞衣不出搗汁服一升並治石淋多食發病
