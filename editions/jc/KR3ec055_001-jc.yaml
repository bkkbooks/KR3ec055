便頻數因熱而崩濁者禁用砂仁味辛入手足陽明經功專消食散滯得白朮條芩能安胎一名縮砂蜜白豆蔻味辛熱入手太陰經功專散滯破積脾虛瘧疾感寒腹痛白睛翳膜目眥紅筋得砂仁甘草治小兒吐乳得砂仁丁香陳皮治反胃凡因熱受病者均忌胃冷噁心食下即吐以三枚研末酒沖服肉豆蔻味辛溫入手足陽明經功專暖脾胃固大腸得木香附子治久瀉不止煨用一名肉果草豆蔻味辛入足太陰陽明經功專散滯氣消鬲上痰得熱附子治寒瘧得烏梅治久瘧不止含之去口臭有內熱者宜忌一名草蔻草果仁味辛酸入足太陰經功專散寒濕鬱滯得知母治瘴瘧得烏梅截瘧得木瓜曲柏療中虛惡谷面裹煨用忌鐵一名草果香附味苦辛入足厥陰經通行十二經功專下氣解鬱得木香則散滯和中得山梔能降鬱火得茯苓能交心腎得茴香補骨脂能引氣歸元得厚朴則決壅消脹得艾葉能暖子宮得高良薑治心脾冷痛得烏藥為青囊丸得黃連名黃鶴丹二者皆治百病得烏蘇安胎青鹽炒入腎酒浸炒行經絡醋浸炒消積聚薑汁炒化痰飲炒黑止血忌鐵木香味辛苦入手太陽經功專調氣散滯得黃連治滯下得檳榔治下焦氣滯得橘皮肉果生薑治腹間滯塞冷氣功效捷速煨熟實大腸過服損氣畏火藿香味辛甘微溫入手足太陰經功專快氣和中開胃止嘔以及霍亂吐瀉心腹絞痛肺虛有寒惟胃弱胃熱而嘔者忌得滑石治暑月泄瀉茴香味辛入足陽明少陰經功專散膀胱冷氣乾溼腳氣得生薑鹽治睪丸腫大得川楝子治腎消飲水得杏仁蔥白治膀胱疝痛炒黃用得酒良得鹽入腎疝氣入腎茴香炒作二包更換熨之若陽道數舉得熱則吐勿服古名蘹香產寧夏者佳小茴香味辛溫入足陽明少陰經功專理氣開胃寒疝食料宜之治陰疝以大小茴香各一兩為末豬胞一個連尿入藥酒煮爛為丸每服五十丸一名時蒔蘿一名八角茴香一名舶茴香功用略同自番舶來實大如柏實裂成八瓣一瓣一核黃褐色者佳甘松香味甘溫芳香入足太陰經功專理氣開鬱治腹卒滿痛風疳齒䘌膝腳氣浮煎洗良腎虛齒痛以甘松硫黃等分為末泡湯漱之神效良薑味辛氣溫入足太陰陽明經功專溫中下氣得茯苓治胃寒噫逆得粳米治霍亂腹痛並主治暖痢冷癖肺胃熱者忌之子名紅豆蔻並用東壁土炒用蓽茇味辛熱入手足陽明經功專除胃冷溫中下氣消食祛痰得牛乳點服治水瀉氣痢得乾薑細辛治牙因寒痛鼻流青涕以末吹之甚效菸草味辛溫有毒入手足太陰通行十二經功專去滯氣停痰闢山嵐瘴霧一名相思草金銀花味甘入手太陰足厥陰經功專散熱解毒得當歸治熱毒血利得黃耆名六一湯治癰疽後發渴以花燒存性研末沙糖拌沖服治腹痛下痢極效藤名忍冬蒲公英味甘平苦寒入足陽明厥陰少陰經功專化熱毒解食毒治腫核通淋得忍冬與酒煎服以渣搗塗乳癰良掘其根大如拳旁有人形拱抱者取以搗汁酒服治噎膈良多年惡瘡以之搗爛貼塗均妙一名黃花地丁紫花地丁味辛苦入足陽明經功專治乳癤痘疔與黃花地丁相同天名精味甘寒微毒入手足陽明厥陰經功專破血治砂淋血淋得乳麝少許共為末吹治乳娥喉痹若小兒急慢驚風牙關緊閉絞汁入好酒灌之即醒以渣用醋拌敷項下神效根名杜牛膝男女吐血曬乾為末茅花湯調服二錢蟲痛以肥肉汁調服子名鶴蝨大腸蟲出不斷斷之復生行坐不得炒研為末水調服半兩許即愈以之煎湯洗痔渣敷患處或搗敷蛇蟲螫毒尤良地黃為使一名地松一名活鹿草一名蝦蟆藍山豆根味苦寒入手太陰經功專瀉心火治喉痛喉腫齒痛齦腫喘滿熱咳腹痛下利五痔諸瘡解藥毒敷禿瘡蛇狗蜘蛛傷療人馬急黃惟脾虛胃弱者忌食少便溏受寒者尤忌牛蒡子味辛入手太陰經功專消肺風利咽膈得荊芥治咽喉不利得生草治懸癰喉痛得甘桔治咽喉痘疹得薄荷治風熱癮痧搗和豬脂貼瘡腫及反花瘡性冷而滑利虛寒泄瀉者忌服一名鼠黏子一名惡實山慈菇味甘微辛有小毒入足厥陰少陽經功專清熱散結消腫以醋磨塗良並吐風狂痰涎漏蘆味鹹苦寒入手足太陰經功專散熱解毒通經下乳排膿止血生肌殺蟲治遺精尿血癰疽發背及痘疹毒甘草拌蒸連翹為使貫眾味苦微寒有毒入手太陰足厥陰經功專解邪熱治崩中帶下產後血氣脹痛破癥瘕發斑痘化骨鯁殺三蟲以之浸水中去垢闢毒射干味辛苦微涼有毒入手少陰厥陰經功專散結氣喉痹咽痛不得稍息並療瘧母喉痹不通以根搗汁咽之大腑動即解或醋研取汁噙之引出涎亦妙又方用紫蝴蝶根一錢黃芩生草桔梗各五分為末水調頓服立愈傷寒咽閉腫痛用生射干豬脂各四兩合煎令焦去渣每噙棗許即瘥乳癰初起用射干殭蠶萱草根為末蜜調敷之神效千金子味辛溫有毒入手足陽明太陽經功專破血行水去殼以色白者壓去油用十數枚煎服治痰飲神效一名續隨子馬蘭子味苦入足厥陰經血分功專治寒疝喉痹癰腫瘡癤婦人血氣煩悶血運崩帶利大小腸久服令人瀉治痢用醋拌一名蠡實蓖麻子味苦有毒性善收亦善走入手太陰足太陽經功專開通諸竅經絡治偏風頭痛合乳香等分搗成餅隨左右貼太陽解發出氣即愈治口眼喎斜只用蓖麻子一味搗爛左喎貼右右喎貼左即正治鼻窒耳聾以綿裹塞之喉痹舌脹取油作紙捻燒煙燻之竹木刺入肉搗敷傷處頻看刺出即去之否則必胬出好肉竹木骨哽以凝水石共研作一捻置舌根噙咽旋即不見湯火灼傷同蛤粉等分湯傷以油調火灼以水調塗之效發黃蓖麻仁以香油煎焦去滓三日後頻覆即黑腳氣作痛以仁七粒研碎同蘇合香丸貼足心痛即止胞衣不下以蓖麻一粒巴豆一粒麝香一分貼臍中並足心胎下即去若子腸出而不收以蓖麻仁數粒搗貼頭頂俟一收進遂即去之切不可遲白頭翁味苦入手足陽明經血分功專治熱毒下痢得秦皮黃連黃柏治厥陰熱痢若血分無熱者忌得酒良王瓜味苦寒入手足太陰經功專瀉熱利水治天行熱疾黃疸消渴便數帶下月閉瘀血利大小腸排膿消腫下乳得伏龍肝搗汁調和服治傷寒發斑即土瓜根子名赤雹子治肺痿吐血腸風瀉血赤白痢得棗肉平胃散酒服治反胃王不留行味甘苦入足厥陰經功專行而不住又為陽明衝任之藥通經下乳催生得穿山甲服之下乳甚捷漿水浸用得黃柏治誤吞鐵石神效冬葵子味甘氣寒入足太陽經功專滑利能通精下胎得砂仁治乳汁蓄癰得牛膝下胞衣得榆皮治水腫得滑石木通蔥白治子淋黃蜀葵子半合研爛以酒濾去渣溫服催生赤花治赤帶白花治白帶葵子為末塗湯火傷白蘚皮味苦入手太陰陽明經功專除風濕痛痹鼠瘻已破者服之最效惡桑螵蛸桔梗茯苓萆薢萆薢味苦入足陽明厥陰經功專去風濕得杜仲治腰腳痹軟得石菖蒲益智仁治白濁頻數莖痛薏苡為使畏大黃柴胡前胡忌茗醋土茯苓味甘平淡入手足陽明經功專健脾胃祛風濕利小便治筋骨拘攣楊梅瘡毒忌茶一名冷飯糰白蘞味苦入足少陽厥陰經功專清上逆之火泄下郁之熱以及陰腫帶下得白芷治諸物哽咽得附子治風痹筋急同丹皮或半夏為末酒服治箭鏃不出同白芨為末斂瘡口湯火爛傷以末敷之效反烏頭旱蓮草味甘酸入足少陰厥陰經功專烏髭發益腎陰得青鹽固齒得車前治溺血性寒若不同薑汁椒紅相兼修服恐腹痛作瀉偏正頭風用汁滴鼻中良獨用焙研每晨米飲下二錢治腸風臟毒下血不止用搗汁沖極熱黃酒飲之治痔漏瘡發外即以渣敷患處重者不過三服神效一名鯉腸一名金陵草劉寄奴草味甘溫入足厥陰經功專活血通經除症下脹金瘡要藥得骨碎補延胡索治折傷瘀血在腹內大小便血為末茶調服即止風入瘡口腫痛為末摻之即止多服令人吐利馬鞭草味苦微寒入足厥陰經功專破血通經殺蟲消脹治氣血症瘕癰瘡陰腫穀精草味辛溫入足厥陰陽明經輕浮上行功專明目退翳功勝菊花亦治喉痹齒痛陽明風熱羯羊肝一具不洗竹刀割開入穀精草煮熟食之或作丸茶下治小兒雀盲得決明子木賊甘菊密蒙花生地治障翳得防風為末米飲服之治目中翳膜神效忌鐵決明子味甘苦鹹平入足厥陰經功專除風熱治一切目疾作枕治頭風明目勝於黑豆俗呼馬蹄決明惡大麻仁蓼實味辛溫入手足太陰足厥陰經功專溫中明目下水氣青葙子味苦微寒入厥陰經功專祛風熱鎮肝明目治青盲障翳蟲疥惡瘡瞳子散大者忌服一名草決明馬勃味辛平輕虛入手太陰經功專清肺解熱散血止嗽得馬牙硝等分為末砂糖和丸芡子大噙之治失音但用馬勃吹喉治喉痹喉腫以蛇退一條燒灰同馬勃綿裹一錢含咽治咽痛喉腫立時即瘥木鱉子味苦溫微甘有小毒入足厥陰經功專利大腸追毒生肌除䵟外科要藥能毒狗番木鱉治喉癖敗醬味苦入手足陽明厥陰經功專破血排膿得四物治惡露不止得當歸川芎桂心治產後腰痛一名苦菜用根苗
