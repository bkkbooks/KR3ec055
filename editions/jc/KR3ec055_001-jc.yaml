body:
  text: 卷一草部黃耆味甘微溫入手足太陰經功專益氣得當歸活血得白朮補氣得防風其功益大得滑石白糖煎服治洞泄完穀不化神效合人參甘草生薑為保元湯治痘虛不起或加芎藭官桂糯米助之生涼炙溫生用或酒炒達表蜜炙補中鹽水炒補腎茯苓為使惡龜甲白蘚皮畏防風氣旺者禁用陰虛者宜少用甘草味甘平入足陽明通行十二經功專解毒生瀉熟緩甘和溫補得桔梗清咽喉得大豆為甘豆湯解百藥毒奇驗炙用補中生用瀉火用梢達莖中止莖痛及淋症白朮苦參乾漆為使惡遠志反大戟芫花甘遂海藻然亦有並用者中滿者忌用惟得茯苓則不資滿而反泄滿若脾胃氣有餘與痢疾初起均忌用人參味甘苦入手太陰通行十二經功專補五臟之陽得羊肉補形古方寒熱攻補劑中皆用之以立正氣誠為上品茯苓為使畏五靈脂惡皂莢黑豆紫石英人溲鹹鹵反藜蘆忌鐵參蘆能湧吐痰涎體虛人用之以代瓜蒂北沙參味甘入手足太陰經功專補五臟之陰止嗽除疝得麥冬清肺熱得糯米補脾陰寒客肺中作嗽者勿服產沙地者良畏防己反黎蘆一名羊乳丹參味苦入手少陰經功專調婦人經脈抵四物之功得山查炭益母草清產後瘀血發熱畏鹹水忌醋反藜蘆元參味鹹入足少陰經功專清火滋陰得甘草桔梗止咽痛得牡蠣貝母治瘰癧元參酒炒一錢荊芥穗微炒一錢泡湯頻飲治頭暈目眩神效脾虛泄瀉者忌用蒸焙勿犯銅器惡黃耆山茱萸薑棗反藜蘆白朮味辛甘入足太陰經功專除濕益氣得枳實能滌飲消痞得條芩能安胎無濕者禁用潰瘍亦忌以能生膿作痛也和脾糯米泔浸助脾土炒或蜜水炒人乳拌以制燥千金方齒長出口名曰髓溢單用白朮愈蒼朮味苦辛溫入足陽明經功專補脾燥濕升陽散郁得防風發汗得黃柏勝濕得香附快中下二焦之氣得山梔解術性之燥二術皆防風地榆為使糯米泔浸焙乾同芝麻炒以制其燥葳蕤味甘入手太陰經功專補中益氣得石膏乾葛治風溫自汗身重語言難出諸不足可代參耆然力薄鮮效去皮節或蜜水或酒浸蒸用畏鹽滷一名玉竹一名地節黃精味甘入足太陰陽明經功專補諸虛安五臟得枸杞補精益氣得蔓荊養肝明目久服不飢俗名山姜九蒸九曬用狗脊味苦甘入足少陰經功專強肝腎健筋骨得鹿茸白蘞治帶下得川烏萆薢治諸風有黃毛如狗形故曰金毛狗脊去毛切酒拌蒸萆薢焉使石斛味甘鹹入足陽明太陰少陰經功專清胃熱兼益腎精得生薑治囊濕精清小便餘瀝同川芎為末搐鼻治睫毛倒入去頭根酒浸用惡巴豆畏殭蠶遠志味苦辛入足少陰經功專治健忘得茯苓入腎通陽得棗仁通心安神去心甘草水浸一宿用畏珍珠藜蘆得茯苓龍骨良石菖蒲味辛入手少陰足太陰經功專開發心陽得犀角生地連翹治熱邪入絡神昏去皮微炒用秦艽為使惡麻黃忌飴糖羊肉鐵器牛膝味酸苦入足厥陰經功專下達生用逐瘀熟用強筋得肉蓯蓉益腎得杜仲補肝性下行滑竅夢遺失精及脾虛下陷因而腿膝腫痛者禁用下行生用入滋補藥酒浸蒸惡龜甲畏白前忌羊肉墮胎甘菊花味兼甘苦入手太陰經功專清頭目風火得枸杞便能下行悅腎朮杞地骨皮為使黃者入陰分白者入陽分紫者入血分五味子味酸兼鹹苦甘辛入手太陰足少陰經功專斂肺經浮游之火歸腎藏散失之元得半夏治痰得阿膠定喘得吳茱萸治五更腎泄瞳子散大咳嗽初起脈數有實火者忌用入滋補藥蜜浸蒸入勞嗽藥生用槌碎核若風寒在肺宜南產者蓯蓉為使惡葳蕤天門冬味甘苦入手太陰經功專清肺熱得熟地入腎得人參五味枸杞同為生脈之劑性冷利胃虛無熱及瀉者忌用去心皮酒蒸地黃貝母為使惡鯉魚麥門冬味甘入手少陰太陰經功專清心保肺得地黃阿膠麻仁同為潤經復脈之劑得五味子能都攝肺腎之津液但性寒而泄氣弱胃寒人禁用去心用入滋補藥酒浸地黃車前為使惡款冬花苦參青葙木耳款冬花味辛入手太陰經功專開痰止嗽得白薇貝母百部治肺實鼻塞得黃連敷口中疳瘡揀淨花甘草水浸一宿暴用得紫菀良杏仁為使惡皂莢硝石玄參畏黃耆貝母連翹麻黃青葙辛夷雖畏貝母得之反良紫菀味苦辛入手太陰經功專療咳逆上氣得款冬百部烏梅治久咳得白前半夏大戟治水氣喘逆蜜水浸焙用款冬為使惡天雄瞿麥藁本遠志畏茵陳白者名女菀旋覆花味鹹甘溫入手太陰陽明經功專散結氣得代赭石半夏治噫氣得蔥新絳治半產漏下大腸虛者慎用根能續筋筋斷者搗汁滴傷處滓敷其下半月不開筋自續又名金沸草百部味甘苦微溫入手太陰經功專治咳嗽殺蟲得生薑治經年寒嗽去心皮酒浸焙用有小毒洗衣去蝨桔梗味苦入手太陰足少陰經功專清喉利膈得甘草能載引上行入肺為舟楫之劑開提氣血表散寒邪清利咽喉下痢腹痛腹滿腹鳴去浮皮泔浸微炒用畏龍膽白芨忌豬肉有甜苦二種甜者名薺苨馬兜鈴味苦寒入手太陰經功專治熱咳實證得甘草治肺氣喘急亦可吐蟲千金方單服治水腫去筋膜取子用有毒多服則吐利不止搗末塗疔腫良白前味甘微辛入手太陰經功專降氣下痰得桔梗桑皮治咳嗽吐血去頭須甘草水浸一晝夜焙用忌羊肉白芨味苦入手太陰經功專療金瘡癰毒得黃絹丹皮能補脬損並跌打折傷手足皴裂滑肌紫石英為使畏杏仁反烏頭重舌鵝口為末乳汁調塗足心半夏味辛入手太陰少陰二經功專消痰止嘔救五絕急病得醋製再得茯苓甘草治伏暑引飲得黃連栝蔞治結胸得硫黃治老人虛秘得牡蠣豬苓治無管攝之遺濁得沉香末生薑治眉稜骨痛神效柴胡射干為使畏生薑秦皮龜甲雄黃忌羊肉海藻飴糖惡皂莢反烏頭天南星味苦溫入手足太陰經功專豁痰驅風得生薑天麻治吐瀉慢驚得防風治跌撲金刃傷風得琥珀硃砂治痰迷心竅墮胎陰虛燥痰均忌畏附子乾薑防風一名虎掌得防風則不麻火炮則毒性緩得牛膽則不燥且膽有益肝膽之功貝母味甘入手太陰經功專潤肺化痰得桔梗下氣得白芷消便癰去心糯米拌炒黃搗用以生末塗人面瘡神效厚朴白薇為使畏秦艽反烏頭栝蔞實味苦入手太陰經功專潤燥降火得文蛤治痰嗽得杏仁烏梅治肺痿咳血二便不通瀉者忌去油用枸杞為使畏牛膝乾膝惡乾薑反烏頭俗作瓜蔞天花粉味甘苦入手太陰經功專潤肺生津通經止小水利熱狂時疾得人參麥冬治消渴飲水脾胃虛寒禁用即栝蔞根研粉澄出極細者曬乾名玉露霜夏枯草味苦辛入足厥陰經功專治頭瘡瘰癧得香附甘草治目珠疼痛得香附貝母治馬刀獨用治目珠夜痛昆布味鹹寒入足太陽經功專軟堅破結得海藻治癭氣結核多服令人瘦獨活味辛苦微溫入足厥陰經功專通關逐痹發表散寒得細辛治少陰伏風頭痛頭暈目眩得地黃治風熱齒痛羌活味辛苦性溫氣雄入足太陽兼入足少陰厥陰經功專泄濕除風得當歸利勞傷骨節痠痛得蔥頭生薑黃酒腳白鳳仙根不拘多少不加水煨熱熏洗日兩次治手臂痠麻痛不可動神效予曾臂麻不仁熏洗半年而愈並不服藥血虛者禁用防風味甘辛入手太陽足太陽足厥陰經功專驅風其性柔淫無所不入隨主藥而走經絡得蔥白能通行周身得澤瀉藁本療風濕得當歸芍藥陽起石禹餘糧療婦人子臟風冷若虛痙頭痛不因風寒泄瀉不因寒濕火升發嗽陰虛盜汗陽虛自汗並忌然同黃耆芍藥又能實表止汗合黃耆白朮名玉屏風散為固表聖藥畏萆薢惡乾薑白蘞芫花殺附子毒藁本味辛溫入手太陰足太陽經功專治頭風脊強陰寒腫痛腹中急痛胃風泄瀉婦人疝瘕得木香治霧露之邪中於上焦得白芷療風濕可作面脂獨用煎湯浴疥癬良惡䕡茹葛根味甘辛入足太陰陽明經功專升胃氣散胃中鬱熱得香豉治傷寒頭痛得粟米治小兒熱渴得蔥白治頭痛如破神效開腠發汗解肌退熱為脾胃虛弱泄瀉之聖藥葛花解酒毒尤良生葛汁大寒解溫病大熱吐衄諸血凡斑痘已見點忌用升麻味辛入手陽明手太陰足太陰經功專升發火在上非升不散氣陷下非升莫舉惟東垣善用之得蔥白散手陽明風邪得石膏止陽明齒痛得柴胡引生氣上升得葛根發陽明之汗陰虛火動者忌去須蘆用白芷味辛溫通行手足陽明經功專療風止痛排膿得土貝栝蔞治乳癰得辛夷細辛治鼻病得單葉紅蜀葵根排膿得椿根皮黃柏治婦人濕熱帶下其性升散血熱有虛火者禁用微炒當歸為使惡旋覆花細辛味苦辛入足少陰厥陰經功專宣達甲膽得黃連治口瘡齒䘌得決明鯉魚膽青羊肝療目疾疼痛惡黃耆山茱畏硝石滑石反藜蘆柴胡味苦辛入足少陽經功專入經達氣入絡和血升不上顛頂下不散皮毛故入膽而合其無出無入之性得益氣藥則升陽得清氣藥則散邪陰虛火炎氣升者禁用外感生用內傷升氣酒炒用根治中焦及下降用梢有汗咳者蜜水炒前胡半夏為使惡皂角苗主治卒聾搗汁滴之良出江南古城山名齊接口者佳內雜他藥須揀淨用銀州柴胡宣治虛勞飢熱骨蒸勞瘧熱從髓出及小兒五疳羸熱根長丈餘微白麻黃味苦辛入手太陰足太陽經功專散邪通陽得射干治肺痿上氣得桂心治風痹冷痛夏月禁用過服亡陽蜜炒稍緩止汗用根厚朴白薇為使惡辛夷石膏荊芥味辛入足厥陰經功專治產後血暈得石膏治風熱頭痛得甘草洗爛癧頭旋目暈荊芥穗微炒三錢酒煎服神效若用酒洗元參一錢荊芥穗一錢泡湯常飲亦可治血炒黑用反魚蟹河豚驢肉風在皮裡膜外荊芥主之連翹味苦氣平入手足少陽少陰厥陰氣分兼入手陽明經功專散血結氣聚瀉心與小腸之熱得瞿麥大黃甘草治項邊馬刀得脂麻治瘰癧結核止痛消腫排膿為瘡家聖藥紫蘇味辛溫入手太陰經功專發表散寒得廣皮砂仁則行氣安胎得木瓜厚朴治寒濕腳氣得藿香烏藥溫中止痛得香附解肌得芎藭當歸和血散血得桔梗枳殼利膈寬腸得卜子杏仁消痰定喘葉得百合治夜不寐梗得桔梗治梅核氣解蟹毒前胡味苦入手足太陰陽明經功專散風下氣得桔梗治痰熱咳逆無實熱及無外感者忌用內有硬者名雄前胡須揀去半夏為使惡皂角薄荷味辛入手足厥陰經功專治頭目咽喉口齒諸症得花粉清上化痰另有雞蘇薄荷體虛及夏月均宜少服蘇產者佳木賊味苦入足厥陰經功專去目翳療腸風得禹餘糧當歸川芎治崩中赤白得槐子枳實治痔中出血浮萍味辛散輕浮入手太陰經功專達表發汗甚於麻黃治風濕癱瘓為末吹鼻止鼻衄用紫者為末敷脫肛燒煙闢蚊蒼耳子味甘苦入足厥陰經功專消腫開痹泄濕去風得葶藶治水腫小便閉遍身癢以之煎浴良忌豬肉一名莫耳即詩卷耳葉搗汁服治產後痢天麻味辛入足厥陰足陽明經功專通關透節泄濕除風得川芎補肝得白朮去濕子名還筒子定風補虛血液衰少及非真中風者忌用莖名赤箭又名定風草秦艽味苦辛入手足陽明兼入肝膽功專去風濕攣痹得獨活桂心治產後中風得柴胡甘草治勞熱得薄荷甘草治小兒骨蒸潮熱食減瘦弱獨用治齒下齦痛以牛乳點服並治黃疸煩渴便赤菖蒲為使畏牛乳為末塗口瘡不合豨薟草味苦入足厥陰經功專止麻木生寒熟溫治肝腎風氣四肢麻痹骨冷腰痛膝痛無力若非由風濕而得者忌服研末熱酒服治疔瘡腫毒威靈仙味苦溫入足太陰厥陰經功專去風濕療折傷得砂仁砂糖治骨鯁得木瓜治腰腳諸病氣弱者慎用忌茗面鉤藤味甘苦入足厥陰經功專息風降火得甘草治癇疾得紫草發斑疹久煎無力當歸味苦辛入手少陰足厥陰經功專治女子諸虛不足得人參黃耆補氣生血同牽牛大黃行氣破血得桂附茱萸則熱得大黃芒硝則寒滑大腸治血酒製畏菖蒲海藻生薑惡濕面芎藭味辛溫入手足厥陰經功專療婦人血閉無子得細辛療金瘡止痛得牡蠣療頭風得生犀角去痰清目得臘茶療產後頭痛得烏藥療氣厥頭痛目淚多涕木鬱為病然單服多服令人暴亡經過三月用末空心熱湯調一匙服微動者是胎齒敗口臭水煮含之佳白芷為使畏黃連硝石滑石惡黃耆山茱萸芍藥味酸入手足太陰經功專制肝補脾得人參補氣得當歸養血得白朮補脾得川芎瀉肝得甘草治腹痛得黃連止痢得防風發痘症得薑棗溫經散濕入藥炒用血分醋炒下痢後重生用惡芒硝石斛鱉甲小薊反藜蘆赤者利水行血生地味苦入足厥陰經功專治勞傷血證得麥冬復脈內之陰得木通導小腸之熱痘症熱甚多服損胃酒製不傷胃生寒乾涼熟溫熟地味甘入足少陰經功專生精填髓得砂仁行氣酒煮和血復得久曝得太陽真火能使虛陽歸宿丹田酒製上行外行薑製則不泥惡貝母畏蕪荑忌萊菔蔥蒜銅鐵器得酒門冬丹皮當歸良何首烏味苦澀入足厥陰經功專消癰腫益精髓得當歸枸杞菟絲骨脂芝麻固精延年得胡麻治大風癘疾黑豆與首烏拌勻鋪柳甑入砂鍋九蒸九曬用茯苓為使忌諸血無鱗魚萊菔蔥蒜鐵器丹皮味辛入手足少陰厥陰經功專治相火勝於黃柏得四物治無汗之骨蒸酒拌蒸用畏貝母菟絲大黃忌蒜胡荽伏砒續斷味苦入足厥陰經功專治跌撲傷續筋骨得當歸治勞傷腰痛得平胃散治血痢胎漏酒浸用地黃為使又名接骨草骨碎補味苦入足少陰經功專療閃折筋骨損傷得豬腎治久瀉不止得獨活寄生虎骨治痿痹蜜拌蒸益母草味苦辛入足厥陰經功專治絡調經功效甚捷得炒黑山楂治產後惡露不行忌鐵子微炒用又名茺蔚吹乳成癰以草為末水調塗乳上一宿自消生搗亦得瞳子散大者忌用佩蘭味辛入陽明太陰經功專消渴散結滯清肺消痰為婦科要藥產後水腫血虛浮腫防己等分為末每服二錢醋酒下神效防己為使白薇味苦入陽明經功專治暴中風身熱肢滿忽忽不知人狂惑邪氣寒熱痠疼溫瘧得桂枝石膏竹茹治胎前虛煩嘔逆得人參當歸甘草治產後血厥昏冒酒洗用惡大黃大戟山茱薑棗艾葉味苦入足厥陰經功專暖子宮殺蟲䘌得香附治少腹痛得阿膠治產後下血得雄黃治狐惑症腦漏鼻出黃汁以艾絨裝在煙筒內吸食數日即愈丹田氣弱臍腹冷者以熟艾裝袋兜臍上效寒濕腳氣夾入襪內佳入茯苓數片同研則易細香附為使血熱者忌延胡索味辛入足太陰厥陰經功專破血行傷得川楝子治熱厥心痛得茴香治小兒盤腸痛獨用力迅宜兼補氣血藥血熱氣虛者禁酒炒行血醋炒止血生用破血炒用調血紅花味辛入手少陰經功專活血消腫得去風藥治六十二種風得補益藥生新血作胭脂活血解毒痘疔挑破以油胭脂敷之良過服血行不止茜草味苦入手足厥陰經功專通經脈療黴毒得生地烏髭發得阿膠側柏療婦人敗血無瘀滯者忌投一名茹藘一名血見愁根可染絳忌鐵紫草味苦入手足厥陰經功專涼血活血利大小腸得白朮木香治痘瘡血熱毒盛便秘瀉者忌去頭須酒洗凌霄花味酸入手足厥陰經功專行血清火得地龍殭蠶全蠍治大風癘疾肺癰有用為君藥者以是花為末和蜜陀僧唾調敷酒齄鼻甚驗孕婦忌之一名紫葳鼻聞傷腦大小薊味甘溫入足厥陰經大薊功專破血小薊專於消腫冷氣入陰囊腫滿瘀痛煎大薊一服立瘥崩漏不止大小薊根白茅根酒煎服神效三七味甘苦入足陽明厥陰經功專治上下血症得生地阿膠治吐血捷效金瘡要藥又名山漆地榆味苦酸微寒性沉澀入足厥陰經功專除血熱治吐衄崩中腸風血痢若虛寒瀉痢初起並血虛者均忌得發良惡麥冬炒黑用蒲黃味甘入足厥陰經功專治血症生破血熟止血得五靈脂治心腹諸痛得青黛治重舌脹滿以乾薑同蒲黃為末搽舌脹尤效卷柏味辛平入足厥陰經功專破血通經治癥瘕淋結炙用辛溫止血治腸風脫肛俗名萬年松鹽水煮半日井水煮半日焙用䕡茹味辛寒有小毒入足厥陰經功專蝕惡肉排膿血殺疥蟲除熱痹破癥瘕內經云同烏鰂魚骨治婦人血枯甘草為使鬱金味辛入手少陰厥陰經功專去惡血破結聚得明礬治失心癲狂得甘草片腦治痘毒入心經不下行上為吐衄及下為尿血用鬱金末韭汁薑汁童便服痰中帶血加入竹瀝薑黃味苦辛性寒入足厥陰經功專下氣破血得肉桂治寒厥胃痛產後癥瘕血虛臂痛者忌墮胎川廣產者佳蓬莪朮味苦辛入足厥陰經功專破氣中之血得木香療冷氣攻心得阿魏治小兒盤腸痛灰火煨透乘熱搗之入氣分或醋磨酒磨或熟用入血分墮胎虛者忌服京三稜味苦甘平入足厥陰太陰經功專療癥瘕破血結得蓬朮治渾身燎泡得大黃治痃癖得丁香治反胃藥食不下墮胎麵裹煨用按用稜蒁均須佐以補氣健脾之品為要茅根味甘氣寒入手少陰足太陰陽明經功專除熱止血得豬肉治黃汗得枇杷葉治嘔逆花治鼻衄產淋解酒毒肺熱喘急茅針酒煮一根服潰癰癤蘆根味甘寒入手太陰足陽明經功專消渴去嘔逆得麥冬治霍亂煩悶得麥冬骨皮茯苓陳皮生薑治骨蒸肺痿如獨用止小便並解魚蟹河豚毒苧根味甘入手足太陰經功專涼血止漏胎得建蓮糯米能固胎元汁能化血為水皮與產婦作枕止血暈安腹上止產後腹痛搗根貼赤遊丹毒癰疽發背金瘡折傷加龍膽同搗治雞骨鯁雞湯下魚鯁魚湯下同蛤粉各半兩為末每服二錢治小便不通或但用根研末攤絹上貼少腹連陰際須臾即通脫肛以之熏洗亦佳薔薇根味苦澀而冷入手足陽明經功專除風熱濕熱生肌殺蟲治泄痢消渴遺溺好眠癰疽瘡癬牙痛口糜煎汁含