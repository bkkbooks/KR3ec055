body:
  text: 卷九蟲魚鱗介部蟬蛻味辛氣平入手太陰經功專發散除風熱發痘疹退目翳中風失音催生下胎得硃砂治小兒夜啼得薄荷治皮膚風癢以羊肝湯送蟬蛻末一錢治痘後目翳洗淨去翅足漿水煮曬乾螻蛄味鹹寒有毒入足太陽經功專治水腫癰毒得蜣螂治大小便閉得穿山甲塞耳治聾性甚急虛人戒之去翅足炒蜣螂味鹹寒入足厥陰經功專治寒熱驚癇用其白心治疔瘡垂斃螢火味辛入手太陰經功專治溫疫務成子有螢火丸鼠婦味酸溫入足厥陰經功專治寒熱葛洪用以截瘧神效即濕生蟲形如蠹魚䗪蟲味鹹寒有毒入足厥陰經功專下血行傷得桃仁大黃治産婦乾血腹痛得乳香沒藥龍骨自然銅能去傷接骨虛人有瘀宜酌用畏皂角菖蒲一名地鱉蟲虻蟲味甘寒有毒入足厥陰經功專攻血遍行經絡墮胎只在須臾非氣足有畜血者勿服去足翅炒惡麻黃一各蜚蟲蜂蜜味甘性溫入手足太陰厥陰陽明經功專潤臟腑得薤白搗塗湯火傷痛立止得生薑治大頭癩瘡得升麻敷天口虜瘡神效納穀道中通大便同蔥食害人同蔥搗塗癰疽痔瘡良同鮓魚食令人暴亡蜜蠟味淡入手太陰足厥陰經功專調氣得茯苓治陽虛遺濁帶下黃蠟得黃連阿膠治痢下腹痛面青肢冷效得當歸阿膠黃連黃柏陳倉米治産後下痢露蜂房味甘平有毒入手太陰足厥陰經功專塗瘰癧成瘻炙研豬脂和塗良取露天樹上者佳蟲白蠟味甘溫入手太陰足厥陰經功專生肌止血定痛補虛續筋接骨為外科要藥與合歡皮同入長肌肉以蠟頻塗禿瘡並生髮五倍子味酸氣平入手太陰陽明經功專收肺除咳斂腸止利得茯苓龍骨治虛勞遺濁得白礬治腸風下血以自己嗽口水調五倍子末敷臍上治盜汗如神糞後下血五倍末一錢艾湯下良婦人陰血傷者摻之效一名文蛤桑螵蛸味甘鹹平入足少陰太陽厥陰經功專固澀治小兒夜尿及驚風良得龍骨療泄精得茯神遠志菖蒲人參當歸龍骨鱉甲治健忘心神不安以螳螂一個巴豆半粒研敷箭簇傷處極癢癢極乃撼拔之以黃連貫衆湯洗去再以石灰敷之其傷即瘥炙黃或醋煮湯泡煨用或蒸透再焙畏旋覆花白殭蠶味辛鹹入手足厥陰陽明經功專療風痰得白馬通治癥瘕得冰片硼砂牙硝治諸喉風煎湯浴治小兒膚如鱗甲以蠶七個研細薑湯調灌吐一切風痰無風寒客邪者勿服惡萆薢桔梗茯苓桑螵蛸蠶蛹炒食治風及勞瘦蠶繭甘溫瀉膀胱相火引清氣上升止渴癰疽無頭燒灰酒服一枚即出頭黃絲絹得白芨能接斷腸得丹皮白芨治産婦脬損得棕櫚貫仲京墨荷葉四灰治婦人血崩褲襠燒灰治陰陽易女用男男用女原蠶砂味辛甘溫炒黃浸酒入手太陰足厥陰肝經功專治風濕為病肢節不隨皮膚頑痹腰腳冷痛冷血瘀血炒熱尉患處並研末以麻油調敷爛眼弦均良原雄蠶蛾氣熱性淫固精強陽蠶退紙燒存性入麝少許蜜和敷走馬牙疳如加白礬尤妙又以蠶紙燒灰酒水任下能治邪祟發狂悲泣斑蝥味辛寒入足厥陰經功專入下竅利水去毒得糯米治風狗咬傷得滑石治便毒性毒潰肉墮胎去頭足糯米炒熟生用則吐瀉人亦有用米取氣不足質者畏丹參巴豆惡豆花甘草一名斑蝥蠍味甘辛有毒入足厥陰經功專穿筋透節逐濕除風得白附殭蠶治口眼喎斜病虛者忌去足焙尾名蠍梢被螫者以蝸牛塗之即解水蛭味鹹苦入足厥陰經功專破血行傷得蜚𧋽治畜血得麝香治跌打傷以水蛭研細末龜尿調捻鬚梢自倒入根極效誤吞生者入腹生子以田泥調水飲數杯必下或以牛羊熱血同豬脂飲之亦下炒黃枯畏石灰鹽一名馬蟥五穀蟲味寒入手足太陰少陰經功專治熱病譫語毒痢作吐小兒疳積疳瘡漂淨曬乾或炒或煅為末蟾蜍味辛涼微毒入足陽明經功專退虛熱行濕氣殺蟲䘌瘡疽發背未成者用系瘡上半日再易一個三易則毒散重者剖之合瘡上三易必愈治單腹鼓脹以蟾蜍一個用砂仁填滿腹中外用鹽水拌黃土泥厚塗遍身文火煨透再去泥陰陽瓦上炙炭存性研細每用一錢陳皮湯下三四服即愈蟾酥辛溫有毒治發背疔腫小兒疳疾腦疳一名蝦蟆田雞味甘寒入手足太陰經功專解勞熱熱毒利水消腫饌食調疳瘦補虛損尤宜産婦搗汁服治蝦蟆瘟凡渾身水腫或單腹脹以一二枚去皮炙食自消燒灰並涂月蝕瘡治毒痢噤口以田雞一個搗爛瓦上烘熱加麝香少許作餅貼臍上氣通即能進食一名水蛙蜈蚣味辛溫有毒入足厥陰經功專治尸疰惡氣若遇臍風撮口以之去頭足尾甲以薄荷葉燒火炙末豬乳調服甚效畏蜘蛛蜒蚰雞屎桑皮鹽蒜墮胎蚯蚓味酸鹹寒入手少陰經功專利水除濕熱消腫毒得乳香治驚風悶亂和麵作餛飩吃治癡癲若溫病大熱狂言大腹黃疸腎風腳氣以為佐使或曬乾為末或鹽化為水或微炙或燒灰俱可中其毒者以鹽水解蚯蚓泥即蚯蚓屎甘寒瀉熱解毒治赤白久痢敷小兒陰囊熱腫腮腫丹毒鯉魚味甘平入手足太陰少陰經功專下水氣利小便治咳逆上氣腳氣黃疸得白朮當歸白芍生薑治妊娠水腫名鯉魚湯作羹治崩漏痔瘻骨炙灰療魚骨哽膽苦明目合青魚膽治內障鰱魚味甘溫入手足太陰經功專溫中益氣多食熱中發渴發瘡疥一名鱮魚鯇魚味甘溫入手足太陰經功專暖胃和中俗名草魚青魚膽味苦寒入足厥陰經功專瀉熱治目疾點眼消赤腫障翳治喉痹痰涎塗熱瘡療骨哽肉益氣力同韭白煮治腳氣腳弱煩悶勒魚味甘平入手足太陰經功專開胃暖中作鯗尤良鱸魚味甘平有小毒入手足太陰陽明經功專補五臟益筋骨和腸胃作鮓尤良曝乾甚香美一名四鰓出吳中松江府城食肝剝人面皮同乳酪食毒不可解中其毒者蘆汁可解白魚味甘平入手足太陰陽明經功專開胃下氣去水氣金匱有滑石白魚散令人肥健經宿勿食食之令人腹冷多食生痰與棗同食患腰痛一名鱎魚鱖魚味甘平入手足太陰陽明經功專補虛勞益脾胃去瘀殺蟲鰥魚味甘平入足陽明經功專已嘔暖中益胃一名鱤魚又名䱤魚嘉魚味甘溫入足少陰經功專治腎虛消渴勞瘦損傷一名鮇魚又名丙穴魚鯔魚味甘平入足陽明經功專開胃百藥無忌石首魚味甘平入足陽明少陰經功專開胃益氣白鯗主治中惡消宿食炙食消瓜積腹脹下痢以頭中之石十個與當歸等分為末服治石淋神效魚鰾暖精種子又名黃花魚以骨插甜瓜蒂上一夜便熟線魚鰾味甘鹹入足陽明經功專補益精氣燒灰治産難血暈得甘蔗節治吐血不止鰣魚味甘平入手足太陰經功專補虛勞以鱗不沾水曬乾研末擦楊梅瘡效鯧魚味甘平入手太陰陽明經功專益氣力子有毒食之令人下痢鯽魚味甘溫屬土入手足太陰陽明經功專行水實腸胃腸風下血用活鯽魚一個去腸留鱗入五倍子末填滿泥固煅存性為末酒服一錢神效忌麥冬芥菜沙糖豬肝子調中益肝氣去目中障翳一名鮒魚魴魚味甘溫入足陽明經功專調胃氣惟有疳痢者忌食一名鯿魚金魚味甘鹹平入手足陽明經功專治久痢及噤口痢銀魚味甘平寬中健胃吳江者佳一名鱠殘魚七星魚味甘寒入手足太陰陽明經功專祛風下水療五痔治濕痹利大小腸治妊娠水氣凡膽皆苦獨是膽帶甘喉痹將死者點入即瘥病深者水調灌之俗名烏魚本草名鱧魚鰻鱺味甘平入手太陰經功專去風殺蟲治骨蒸勞瘵濕痹風瘙陰戶蝕癢補虛損其骨燒煙蚊化為水置衣箱中闢諸蠹血瘡疹入眼以少許點之良鱔魚味甘大溫入手足太陰厥陰經功專補五臟除風濕尾血療口眼喎斜少和麝左喎塗右右喎塗左正則洗去滴耳治耳痛滴鼻治鼻衄點目治痘後生翳頭治百蟲入耳鰍魚味甘平入手太陰經功專暖中益氣醒酒解渴同米粉煮羹食調中收痔煮食療陽事不起俗名泥鰍海螵蛸味鹹入足厥陰經功專療血滯得生地治血淋得乾薑治血瘕得鹿茸阿膠治崩中帶下燒末酒服治腹痛環臍陰蝕腫痛以生者為末加麝香少許點目治目翳淚出捻入耳治耳聤出膿肉酸平益氣強志益人通經以蒲黃等分為末塗舌腫出血如泉並敷跌破出血一名烏賊骨性溫和血祛寒濕治血枯尤良惡附子白芨白蘞能淡鹽海蛇味鹹平入足厥陰經功專治婦人勞損積血帶下小兒風疾丹毒湯火傷並治河魚之疾蝦味甘溫入手足太陰少陰厥陰經功專托痘瘡下乳汁吐風痰中風證以蝦半斤入蔥姜醬料水煮先吃蝦次吃汁以鵝翎探引吐出痰涎即愈能壯陽道動風發嗆海蝦味甘鹹平入手足太陰少陰厥陰經功專祛風殺蟲治疥癬風癢濕癢以生蝦殼曬乾研末加白糖拌塗禿瘡神效同豬肉食令人多唾海馬味甘溫入足少陰厥陰經功專暖水臟壯陽道消瘕塊治疔瘡腫毒婦人難産及氣血痛獺肝味甘溫入足厥陰經功專治鬼疰傳尸得竹節中水治心腹積聚以肝陰乾為末水服二錢每日三服治尸疰神效肉治骨蒸勞熱血脈不行多食消陽氣海狗腎味鹹熱入足少陰厥陰經功專治陰痿精寒鬼交尸疰陽易舉骨蒸勞嗽者忌以漢椒樟腦同收則不壞同糯米法面釀酒服治虛損一名膃肭臍河豚味甘溫有毒入足厥陰經功專去濕氣肝子尤甚惟以眼睛用輕粉拌放罐內埋之數日即化為水取出塗腳上拔雞眼甚效煮河豚稍沾灰塵食之殺人食之腹痛多吃橄欖即解帶魚味甘入手太陰經功專溫補五臟去風殺蟲作羹良鯊魚味甘平入手太陰經功專補五臟翅清金滋陰補而不滯味甚美一名鮫魚鱘魚味甘平有小毒入手太陰厥陰經功專發諸病惟煮汁飲治血淋一名王鮪鱘鱑魚味甘平入手太陰厥陰經功專發病與鱘魚同一名鱣魚和蕎麥食令人失音海參味甘鹹溫入手足太陰少陰經功專補腎益精壯陽療痿龍骨味甘澀氣微寒入手足厥陰少陰少陽經功專固脫得遠志治健忘得韭子治滑精得桑螵蛸治遺尿得白石脂治泄瀉不止水飛三度或酒煮酥炙火煅或生用忌魚鐵畏石膏川椒得人參牛黃良龍齒鎮心涼驚功用同前穿山甲味辛鹹寒有毒善竄入足厥陰手陽明經功專治風濕冷痹通經下乳消腫潰癰止痛排膿通竅殺蟲發痘風瘧為瘡科要品治蟻瘻神效癰疽已潰痘瘡挾虛大忌或生或燒或醋炙童便炙油煎土炒俱可蛤蚧味鹹溫入手太陰足少陰經功專補氣益血得人參治喘嗽勞損痿弱咳由風寒外邪者勿用酥炙或蜜炙或酒浸焙蛇蛻味甘鹹入手太陰經功專發表驅風退翳敗毒治驚癇風瘧重舌鬼魅蠱毒喉風疥瘡瘡腫痔漏産難目翳小兒口緊不能開合燒灰敷良或酒或醋或蜜浸炙黃或燒存性或鹽泥固煅得當歸治纏喉風得蟬蛻鐵落頭髮治産難不下蚺蛇膽味苦而甘有小毒入手少陰足厥陰經功專涼血明目得血竭乳香沒藥丹砂䗪蟲天靈蓋象牙末狗骨灰麻皮灰作丸受杖時噙之杖多不死不痛白花蛇味甘鹹溫有毒入手足太陰厥陰經功專治風濕癱瘓大風疥癩類中風屬虛者大忌頭治癜風毒癩得火良烏梢蛇無毒力淺功同白花蛇或酥炙用龜板味鹹入足少陰經功專通任脈得黃柏知母治陰虛勞熱得側柏香附治鬱結得婦人發芎歸治交骨不開下死胎得鹿膠陰陽並補腎虛無熱者忌陰囊腫爛異常先用蘇梗煎湯洗淨汙垢以龜板一個煅研加孩兒茶少加冰片調敷即愈惡沙參尿染須治啞聾龜胸龜背以尿摩之瘥鱉甲鹹寒屬陰入足厥陰少陰經功專治痎瘧痃瘕得青蒿治骨蒸勞熱得桃仁治賁豚氣痛無肝熱者忌服醋炙治石淋賁豚童便炙治勞病肉涼血補陰以生薑沙糖作羹食不用鹽醬治瘧痢脾虛者大忌惡礬石忌莧菜雞子蟹味鹹寒有小毒入手足太陰厥陰經功專除熱結通經脈續筋骨生搗熱酒調服治跌打損傷汁塗漆瘡能敗漆爪