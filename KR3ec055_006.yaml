body:
  text: 卷六金石部金味辛平有毒入手少陰太陰足厥陰經功專鎮心肝安魂魄專治驚癇風熱肝膽之病磨細屑挑開疔頭抹入能拔疔根丸散用箔為衣煎劑加入藥煮畏錫水銀五金遇水銀皆碎其相畏如此銀功用略同食物有毒以銀箸插入即變黑色自然銅味辛入足厥陰經功專治折傷續筋骨去瘀止痛得折傷必有瘀血凝滯經絡須審其虛實佐以養血補氣溫經之品産銅坑中火煅醋淬七次細研甘草水飛用銅青味酸平微毒入手足太陰厥陰經功專吐風痰止瘍血理氣痛服之損血殺蟲有效以醋製銅刮用頭上有蝨銅青明礬末摻之良走馬牙疳用溺桶中白垢火煅一錢入銅緑三分麝香一分敷之立愈一名銅緑鉛味甘寒辛入手足太陰厥陰經功專墜痰安神明目殺蟲烏須療惡瘡得當歸接骨續筋得黍米治腹中鱉症得豬脂療誤吞金銀單用煎湯服解硫黃毒性帶陰毒傷人心胃一名胡粉鉛丹味鹹寒沉重入手足太陰少陰經功專墜痰止驚單用塗黃水瘡神效得龍骨牡蠣治心臟神驚一名黃丹蜜陀僧味辛平有小毒入手足太陰厥陰經功專墜痰鎮驚止血散腫以饅頭劈開將蜜陀僧為末放其中夾腋下治狐臭氣食之令人寒中古文錢味辛平有毒入足厥陰經功專治目中障瘀腐蝕壞肉婦人生産橫逆心腹痛月膈五淋或燒醋淬或煮汁若唇腫黑痛癢不可忍以錢在石上磨汁同豬脂塗之數遍即愈目卒不見石上磨汁注眥中效鐵味辛平有毒入手少陰足太陰厥陰經功專鎮心平肝定驚療狂消癰解毒煅時砧上打落者名鐵落即鐵屑治怒狂研粉敷癬良如塵飛起者名鐵精器物生衣者名鐵鏽鹽醋浸出者名鐵華畏磁石皂莢以皂莢木燒鍋即裂相剋可知真鋼砂功專破積平肝得黃連苦參治熱脹腹瀉針砂味辛平入手太陰經功專消水腫黃疸散癭瘤烏髮須此是作針所磋之針屑雲母石味甘平入手足太陰厥陰經功專除邪安臟得蜀漆龍骨治牝瘧同黃丹熬膏貼癰疽金瘡以雲母粉敷金瘡出血最妙澤瀉為使惡羊肉白石英味甘平入手足少陰陽明經功專治痿痹肺癰實大腸利小便得硃砂治驚悸得磁石治耳聾白如水晶者良紫石英味甘辛溫入手少陰足厥陰經功專治子宮寒不孕鎮心去怯益肝去枯火煅醋淬七次研末水飛二英俱畏附子黃連癰腫毒氣以紫石英煅淬為末生薑米醋煎敷之良丹砂味甘涼入手少陰經功專鎮心安魄辟邪解毒止渴下胎得遠志龍骨養心氣得丹參當歸養心血得生地枸杞養腎陰得厚朴川椒養脾得南星川烏祛風獨用多服令人呆悶辰産名箭鏃砂最良畏鹽米惡磁石忌一切血水銀味辛寒陰毒入手足太陰經功專殺蟲治瘡疥蟣蝨解金銀銅錫毒墮胎絶孕從丹砂燒煅而出得鉛則凝得硫則結並棗肉入唾研則碎散失在地者以花椒末茶末收之畏磁石砒霜輕粉味辛冷燥有毒入手足太陰經功專殺蟲治瘡劫痰消積善入經絡瘛瘲藥有用之者不可輕服土茯苓黃連黑鉛鐵漿陳醬能制其毒銀硃味辛溫有毒入手足太陰經功專破積滯劫痰涎散結胸療疥癬惡瘡殺蟲蝨性燥烈功過同輕粉雄黃味辛入足陽明厥陰經功專解毒勝邪得黑鉛治結陰得硃砂豬心血治癲癇雌黃主治略同血虛者大忌陰腫如斗雄黃礬石各二兩甘草一尺水五升煮二升浸之良石膏味甘辛入足陽明手太陰少陽輕功專解肌發汗得桂枝治溫瘧得蒼朮治中暍得知母甘草粳米治胃腑大熱少壯火熱者功效神速老弱虛寒者禍不旋踵病邪未入陽明者切勿遽投或因其性太寒用火煅則不甚傷胃但少用則難見功且須先煎雞子為使惡巴豆畏鐵亦名寒水石滑石味甘寒入足太陽經功專發汗利小便得甘草解暑止瀉加紅曲治赤痢加乾薑治白痢凡脾虛下陷及精滑有孕病當發表者均忌石葦為使宜甘草赤石脂味甘溫酸澀入手足陽明經功專厚腸止利得乾薑粳米治下利膿血得蜀椒附子治心痛徹背得故紙等分為末米飲下治經水過多研粉或煅研水飛用畏芫花惡大黃松脂禹餘糧味甘平性澀入手足陽明經功專鎮固下焦得赤石脂治傷寒下利得乾薑治赤白帶下得牡蠣烏鰂骨桂心治崩中帶下是藥既能固下亦能催生爐甘石味甘溫入足陽明經功專止血消腫收濕祛痰治爛腿去赤翳得海螵蛸硼砂各一兩硃砂五錢研極細末點目神效以之煅醋淬七次與兒茶為末麻油調敷下疳陰瘡今之黃銅皆爐甘石所點無名異味鹹甘入足厥陰經功專和血醋磨塗治金瘡折傷癰疽腫毒止痛生肌鍾乳味甘溫入足陽明經功專強陰益陽通百節利九竅補虛勞下乳汁肺虛喘急不息以光明鍾乳粉五錢蠟三兩化和飯甑內蒸熟研丸桐子大溫水下一丸氣甚剽悍命門火衰者只可暫用否則有害蛇床為使畏紫石英惡牡丹忌胡荽蔥蒜羊血參術一名鵝管煤味甘辛溫有毒入手太陰足厥陰經功專治婦人血氣痛及諸毒瘡金瘡出血中煤氣毒者飲冷水或白蘿蔔即愈石灰味辛溫毒烈入手足太陰厥陰經功專堅物散血定痛生肌止金瘡血以黃牛膽汁和納膽中陰乾用甚效風化者良古礦灰名地龍骨棺中者尤佳痰核紅腫寒熱狀如瘰癧石灰火煅為末以白果肉同搗貼之如無白果蜜亦可奇效海浮石味鹹寒入手太陰足厥陰經功專軟堅潤下止嗽止渴通淋化上焦老痰消癭瘤結核多服損人血氣頭核腦痹頭枕後生核正者為腦側者為痹白浮石燒存性為末入輕粉少許麻油調塗或加干牛糞尤妙亦治頭𤷍得香附薑汁治疝氣莖縮囊腫咳嗽不止末服良陽起石鹹溫入足少陰經功專補石腎命門治陰痿精乏子宮虛冷腰膝冷痹水腫瘕症煅淬研粉新汲水調塗丹毒腫癢桑螵蛸為使惡澤瀉菌桂畏菟絲子忌羊血磁石味辛入足少陰經功專溫腎鎮怯得熟地山萸肉治耳聾得硃砂神麯能交心腎色黑能吸鐵者真火煅醋淬研末水飛或醋煮三日夜柴胡為使惡牡丹一名吸鐵石代赭石味苦寒入足厥陰經功專入血鎮逆得冬瓜仁治慢驚風得旋覆治心下痞硬噫氣煅紅醋淬水飛乾薑為使畏雄附空青味甘酸寒入足厥陰經功專益肝明目通竅利水真者難得石膽味酸入足少陽經功專吐痰解毒得醋治喉痹垂死得乳香沒藥大棗敷楊梅毒神效市人多以醋揉青礬僞之畏桂白薇辛夷芫花小兒鼻疳蝕爛膽礬燒煙盡研末摻之效一名膽礬礜石味辛大熱有毒入手足太陰經功專治堅癖痼冷寒濕風痹不煉服殺人惡羊血砒石味辛苦酸大熱大毒砒霜尤烈入手足太陰明陽經功專燥痰作吐藥療痰在胸膈除哮截瘧外用蝕敗肉殺蟲枯痔信州者良衡州次之生名砒黃煉石砒霜錫之苗也故錫亦有毒以大棗一個去核將砒霜放入少許用線扎緊瓦上焙焦研細末瓷瓶收貯專塗牙根癢爛神效名砒棗散畏羊血冷水緑豆青礞石味甘鹹入足厥陰經功專利痰止驚得硝石赤石脂治一切痰積痼疾得焰硝治驚風危證得焰硝大黃黃芩沉香名滾痰丸氣弱血虛者忌花蕊石味酸澀氣平入足厥陰經功專化血為水止金瘡出血下死胎胞衣及胎産惡血血暈等症有花蕊石散多服損陰血煅研水飛用一名花乳石石燕味甘涼入手足太陰少陰陽明經功專利竅行濕熱治諸般淋瀝月水淋濁赤白帶下腸風痔瘻眼目瘴翳或煮汁或磨汁為末水飛亦可石蟹味鹹寒入足厥陰經功專治青盲目翳得羚羊角決明治胬肉攀睛若喉痹腫痛以石蟹磨汁飲並塗喉外醋磨敷癰腫食鹽味鹹甘辛寒入手足少陰太陰陽明經功專潤下軟堅笑不休症鹽炒赤煎沸飲之即止體如蟲行癢不可當煎浴良洗目去風凡痰嗽哮證血病消渴及水脹俱大忌戎鹽味鹹寒入手足少陰太陰陽明經功專助水藏益精氣得杜仲補骨脂補肝陽得川椒明目一名青鹽凝水石味辛鹹大寒入手足少陰太陰陽明經功專治時氣熱盛口渴水腫亦各寒水石古方所用寒水石是凝水石唐宋諸方用寒水石即石膏元精石味鹹寒而降入手足太陰陽明經功專治上盛下虛救陰助陽有扶危拯逆之功正陽丹用治傷寒壯熱來復丹用治伏暑熱瀉朴硝味苦鹹性降入手足太陰陽明經功專逐腑積聚得大黃直入大腸滌垢通經墮胎芒硝經煉稍緩能柔五金化七十二石為水生於鹵地刮取煎煉在底者為朴硝在上者為芒硝有牙者為馬牙硝置風日中消盡水氣輕白如粉為風化硝大黃為使火硝味苦辛性升入手太陰經功專破積散堅得殭蠶冰硼吹喉中治喉痹元明粉味辛甘鹹冷入足陽明經功專去胃中實熱蕩腸中宿垢得大黃止瀉痢無實熱而胃虛者禁用忌苦參硇砂味鹹苦辛熱有毒入手足太陰足陽明經功專消食破瘀治噎膈癥瘕去目翳胬肉若鼻中息肉點之即落懸癰卒腫硇砂五錢綿裹含之咽津即安但能爛五金而化心為血不可輕用出西域火焰山者佳硼砂味甘鹹涼色白質輕入手足太陽陽明經功專除上焦胸膈痰熱治喉痹口齒諸病能柔五金去垢膩治噎膈積塊結核胬肉目翳骨哽制汞啞銅證非有餘不可輕用硫黃味酸入足太陰少陰厥陰經功專驅寒燥濕補火壯陽得半夏治久年哮喘得艾治陰毒傷寒烏鰂五味合硫黃敷婦人陰脫能化五金而干汞畏細辛醋血番舶者良白礬味酸寒入手足太陰陽明經功專吐痰解毒得黃蠟解一切腫毒暑天痧症昏迷瞀亂急含少許或沖服立愈得川鬱金治癡疾多食損心肺傷骨甘草為使畏麻黃惡牡蠣緑礬味酸涼入手太陰陽明經功專燥濕化痰解毒殺蟲利小便消食積醋調咽汁散喉痹蒼朮二斤米泔浸黃酒面曲四兩炒絳礬一斤醋拌曬乾入瓶火煅為末醋和丸酒下治木剋土心腹中滿或黃腫如土色名伐木丸煅赤名絳礬未煅者亦名皂礬不可輕服
